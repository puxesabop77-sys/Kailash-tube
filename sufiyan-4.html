<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sufiyan Studio – Nova Tube Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }

  body {
    min-height: 100vh;
    background: #0a0505;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: '';
    position: fixed;
    top: -100px; left: 50%;
    transform: translateX(-50%);
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(200,30,30,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  /* MAIN CARD */
  .card {
    width: 88%;
    max-width: 400px;
    background: rgba(20,12,12,0.85);
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 28px;
    padding: 48px 36px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    backdrop-filter: blur(20px);
    box-shadow: 0 30px 80px rgba(0,0,0,0.6), 0 0 60px rgba(180,20,20,0.1);
    position: relative;
    z-index: 10;
  }

  /* AVATAR */
  .avatar-wrap {
    width: 96px; height: 96px;
    background: #1e1212;
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 32px;
    box-shadow: 0 0 0 6px rgba(200,30,30,0.18);
  }
  .avatar-wrap svg { width: 52px; height: 52px; fill: #cc2222; }

  /* TITLE */
  .studio-title {
    font-size: 30px; font-weight: 900;
    letter-spacing: 1px; color: #fff;
    margin-bottom: 10px; text-align: center;
  }
  .studio-title span { color: #e02020; }

  /* SUBTITLE */
  .studio-sub {
    font-size: 11px; font-weight: 700;
    letter-spacing: 4px; color: #555;
    text-transform: uppercase;
    margin-bottom: 36px; text-align: center;
  }

  /* UPLOAD BUTTON */
  .btn-upload-main {
    width: 100%; padding: 20px 24px;
    background: #e02020; border: none;
    border-radius: 16px; color: #fff;
    font-family: 'Montserrat', sans-serif;
    font-size: 16px; font-weight: 800;
    letter-spacing: 1.5px; text-transform: uppercase;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    transition: all 0.25s ease;
    box-shadow: 0 8px 30px rgba(220,30,30,0.4);
    margin-bottom: 24px;
  }
  .btn-upload-main:hover {
    background: #ff2a2a; transform: translateY(-2px);
    box-shadow: 0 14px 40px rgba(220,30,30,0.55);
  }
  .btn-upload-main svg { width: 22px; height: 22px; fill: white; }

  /* BACK LINK */
  .back-link {
    display: flex; align-items: center; gap: 8px;
    color: #555; font-size: 14px; font-weight: 600;
    text-decoration: none; cursor: pointer; transition: color 0.2s;
  }
  .back-link:hover { color: #888; }
  .back-link svg { width: 16px; height: 16px; fill: currentColor; }

  /* FOOTER */
  .auth-footer {
    position: fixed; bottom: 28px;
    font-size: 10px; letter-spacing: 4px;
    color: #2a2a2a; text-transform: uppercase;
    text-align: center; z-index: 5; width: 100%;
  }

  /* ── UPLOAD MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.88); backdrop-filter: blur(10px);
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-overlay.open { display: flex; }

  .modal-box {
    background: #110d0d;
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 24px; width: 100%; max-width: 520px;
    max-height: 90vh; overflow-y: auto; padding: 32px 28px;
    animation: modalIn 0.35s cubic-bezier(0.16,1,0.3,1);
  }
  @keyframes modalIn {
    from { opacity:0; transform:translateY(30px) scale(0.97); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  .modal-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 28px;
  }
  .modal-title { font-size: 18px; font-weight: 900; color: #fff; letter-spacing: 1px; }
  .btn-close {
    background: rgba(255,255,255,0.06); border: none;
    color: #888; width: 34px; height: 34px; border-radius: 8px;
    cursor: pointer; font-size: 18px;
    display: flex; align-items: center; justify-content: center; transition: all 0.2s;
  }
  .btn-close:hover { background: rgba(220,30,30,0.2); color: #e02020; }

  .field { margin-bottom: 16px; }
  .field label {
    display: block; font-size: 10px; font-weight: 700;
    color: #555; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 7px;
  }
  .field input, .field textarea, .field select {
    width: 100%; padding: 13px 15px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px; color: #f0e6ff;
    font-family: 'Rajdhani', sans-serif; font-size: 15px;
    outline: none; transition: all 0.25s;
  }
  .field input::placeholder, .field textarea::placeholder { color: rgba(255,255,255,0.18); }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: #e02020; background: rgba(220,30,30,0.06);
    box-shadow: 0 0 0 3px rgba(220,30,30,0.1);
  }
  .field textarea { min-height: 72px; resize: vertical; }
  .field select { cursor: pointer; }
  .field select option { background: #1a0a0a; }

  .drop-zone {
    border: 2px dashed rgba(220,30,30,0.35); border-radius: 14px;
    padding: 28px 20px; text-align: center; cursor: pointer;
    background: rgba(220,30,30,0.03); transition: all 0.3s;
  }
  .drop-zone:hover, .drop-zone.drag-over {
    border-color: #e02020; background: rgba(220,30,30,0.08);
  }
  .drop-zone-icon { font-size: 32px; margin-bottom: 8px; }
  .drop-zone p { color: #f0e6ff; font-size: 15px; font-weight: 700; margin-bottom: 4px; }
  .drop-zone small { color: #444; font-size: 12px; }
  .drop-zone input { display: none; }

  .progress-wrap { display: none; margin-top: 14px; }
  .progress-bg { width:100%; height:7px; background:rgba(255,255,255,0.07); border-radius:50px; overflow:hidden; }
  .progress-fill { height:100%; width:0%; border-radius:50px; background:linear-gradient(90deg,#e02020,#ff6b2b); transition:width 0.3s; }
  .progress-lbl { font-size:12px; color:#555; text-align:center; margin-top:6px; }

  .btn-submit-modal {
    width: 100%; padding: 16px;
    background: #e02020; border: none; border-radius: 12px;
    color: white; font-family: 'Montserrat', sans-serif;
    font-size: 14px; font-weight: 800; letter-spacing: 2px;
    text-transform: uppercase; cursor: pointer;
    box-shadow: 0 6px 24px rgba(220,30,30,0.35);
    transition: all 0.25s; margin-top: 8px;
  }
  .btn-submit-modal:hover { background: #ff2a2a; transform: translateY(-2px); }
  .btn-submit-modal:disabled { opacity: 0.6; pointer-events: none; }

  .msg { margin-top: 14px; padding: 12px 16px; border-radius: 10px; font-size: 13px; font-weight: 700; display: none; text-align: center; }
  .msg.success { background: rgba(0,230,100,0.08); border: 1px solid rgba(0,230,100,0.25); color: #00e664; display: block; }
  .msg.error   { background: rgba(220,30,30,0.1); border: 1px solid rgba(220,30,30,0.3); color: #e02020; display: block; }

  /* ACCESS DENIED */
  #accessDenied {
    display: none; flex-direction: column; align-items: center;
    justify-content: center; min-height: 100vh; text-align: center; gap: 16px;
  }
  #accessDenied h1 { font-size: 28px; color: #e02020; font-weight: 900; }
</style>
</head>
<body>

<!-- ACCESS DENIED -->
<div id="accessDenied">
  <div style="font-size:56px">🔒</div>
  <h1>ACCESS DENIED</h1>
  <p style="color:#444;font-size:14px;letter-spacing:2px;text-transform:uppercase;">Admin login required</p>
  <br>
  <button onclick="window.location.href='index.html'" class="btn-upload-main" style="width:auto;padding:14px 28px;margin:0;">GO TO LOGIN</button>
</div>

<!-- MAIN CARD -->
<div class="card" id="mainCard" style="display:none;">
  <div class="avatar-wrap">
    <svg viewBox="0 0 24 24">
      <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
    </svg>
  </div>

  <div class="studio-title">SUFIYAN<span> STUDIO</span></div>
  <div class="studio-sub">Nova Tube Management</div>

  <button class="btn-upload-main" onclick="openModal()">
    <svg viewBox="0 0 24 24"><path d="M18 15v3H6v-3H4v3c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2v-3h-2zM7 9l1.41 1.41L11 7.83V16h2V7.83l2.59 2.58L17 9l-5-5-5 5z"/></svg>
    UPLOAD MASTERPIECE
  </button>

  <a class="back-link" href="home.html">
    <svg viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
    Back to Home
  </a>
</div>

<div class="auth-footer">Authenticated Access Only</div>

<!-- UPLOAD MODAL -->
<div class="modal-overlay" id="uploadModal">
  <div class="modal-box">
    <div class="modal-header">
      <div class="modal-title">🎬 Upload Masterpiece</div>
      <button class="btn-close" onclick="closeModal()">✕</button>
    </div>

    <div class="field">
      <label>Video Title *</label>
      <input type="text" id="vTitle" placeholder="Enter video title">
    </div>
    <div class="field">
      <label>Channel / Creator</label>
      <input type="text" id="vChannel" placeholder="Nova Channel">
    </div>
    <div class="field">
      <label>Description</label>
      <textarea id="vDesc" placeholder="Describe your masterpiece..."></textarea>
    </div>
    <div class="field">
      <label>Category</label>
      <select id="vCategory">
        <option>Gaming</option><option>Music</option><option>Movies</option>
        <option>Education</option><option>Sports</option><option>News</option><option>Other</option>
      </select>
    </div>
    <div class="field">
      <label>Duration (optional)</label>
      <input type="text" id="vDuration" placeholder="e.g. 10:32">
    </div>
    <div class="field">
      <label>Thumbnail URL (optional)</label>
      <input type="url" id="vThumb" placeholder="https://...jpg">
    </div>
    <div class="field">
      <label>Video URL (direct MP4 link)</label>
      <input type="url" id="vUrl" placeholder="https://example.com/video.mp4">
    </div>
    <div class="field">
      <label>— OR — Upload File from Device</label>
      <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div class="drop-zone-icon">📁</div>
        <p id="dropLabel">Tap to select or drag video here</p>
        <small>MP4 · WebM · MOV supported</small>
        <input type="file" id="fileInput" accept="video/*" onchange="handleFileSelect(this)">
      </div>
      <div class="progress-wrap" id="progressWrap">
        <div class="progress-bg"><div class="progress-fill" id="progressFill"></div></div>
        <div class="progress-lbl" id="progressLbl">Uploading to Nova Tube...</div>
      </div>
    </div>

    <button class="btn-submit-modal" id="btnPublish" onclick="uploadVideo()">🚀 PUBLISH NOW</button>
    <div class="msg" id="uploadMsg"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://ahhuhanjvwrltwdnrqxc.supabase.co',
    'sb_publishable_vCOpkdTBVH1d4exzr82JIQ_uNJNIzIu'
  );
  let selectedFile = null;

  (async () => {
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      document.getElementById('accessDenied').style.display = 'flex';
    } else {
      document.getElementById('mainCard').style.display = 'flex';
    }
  })();

  function openModal()  { document.getElementById('uploadModal').classList.add('open'); }
  function closeModal() { document.getElementById('uploadModal').classList.remove('open'); }

  function handleFileSelect(input) {
    if (input.files[0]) {
      selectedFile = input.files[0];
      document.getElementById('dropLabel').textContent = '✅ ' + selectedFile.name;
      document.getElementById('dropZone').style.borderColor = '#00e664';
      document.getElementById('dropZone').style.background = 'rgba(0,230,100,0.05)';
    }
  }

  const dz = document.getElementById('dropZone');
  dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
  dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
  dz.addEventListener('drop', e => {
    e.preventDefault(); dz.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (f && f.type.startsWith('video/')) {
      selectedFile = f;
      document.getElementById('dropLabel').textContent = '✅ ' + f.name;
      dz.style.borderColor = '#00e664';
      dz.style.background = 'rgba(0,230,100,0.05)';
    }
  });

  async function uploadVideo() {
    const title    = document.getElementById('vTitle').value.trim();
    const channel  = document.getElementById('vChannel').value.trim();
    const desc     = document.getElementById('vDesc').value.trim();
    const category = document.getElementById('vCategory').value;
    let   videoUrl = document.getElementById('vUrl').value.trim();
    const thumbUrl = document.getElementById('vThumb').value.trim();
    const duration = document.getElementById('vDuration').value.trim();

    if (!title) { showMsg('⚠️ Title is required', 'error'); return; }
    if (!videoUrl && !selectedFile) { showMsg('⚠️ Provide a video URL or upload a file', 'error'); return; }

    const btn = document.getElementById('btnPublish');
    btn.disabled = true; btn.textContent = '⏳ Publishing...';

    if (selectedFile && !videoUrl) {
      document.getElementById('progressWrap').style.display = 'block';
      const fn = `videos/${Date.now()}_${selectedFile.name.replace(/\s+/g, '_')}`;
      const { error: upErr } = await sb.storage.from('Nova tube').upload(fn, selectedFile, { cacheControl: '3600', upsert: false });
      if (upErr) { showMsg('Upload error: ' + upErr.message, 'error'); btn.disabled=false; btn.textContent='🚀 PUBLISH NOW'; return; }
      const { data: { publicUrl } } = sb.storage.from('Nova tube').getPublicUrl(fn);
      videoUrl = publicUrl;
      document.getElementById('progressFill').style.width = '100%';
      document.getElementById('progressLbl').textContent = '✅ Upload complete!';
    }

    // Refresh session to make sure token is valid
    const { data: { session } } = await sb.auth.getSession();
    if (!session) {
      showMsg('Session expired. Please login again.', 'error');
      btn.disabled = false; btn.textContent = '🚀 PUBLISH NOW';
      setTimeout(() => window.location.href = 'index.html', 1500);
      return;
    }

    const { error } = await sb.from('videos').insert([{
      title,
      channel_name: channel || 'Nova Channel',
      description:  desc || '',
      category:     category,
      video_url:    videoUrl,
      thumbnail_url: thumbUrl || null,
      duration:     duration || null,
      views:        0
    }]).select();

    btn.disabled = false; btn.textContent = '🚀 PUBLISH NOW';
    if (error) {
      console.error('Insert error full:', JSON.stringify(error));
      showMsg('Upload error: ' + error.message, 'error');
      return;
    }

    showMsg('✅ Video published successfully!', 'success');
    ['vTitle','vChannel','vDesc','vUrl','vThumb','vDuration'].forEach(id => document.getElementById(id).value = '');
    selectedFile = null;
    document.getElementById('dropLabel').textContent = 'Tap to select or drag video here';
    dz.style.borderColor = ''; dz.style.background = '';
    document.getElementById('progressWrap').style.display = 'none';
    document.getElementById('progressFill').style.width = '0%';
    setTimeout(() => closeModal(), 2000);
  }

  function showMsg(txt, type) {
    const el = document.getElementById('uploadMsg');
    el.textContent = txt; el.className = 'msg ' + type;
  }
</script>
</body>
</html>
