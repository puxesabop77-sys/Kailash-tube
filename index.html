<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nova Tube - Login</title>

  <!-- Tailwind -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Animated Background -->
  <style>
    body {
      background: linear-gradient(-45deg, #0f0f0f, #1a1a2e, #16213e, #0f3460);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
      height: 100vh;
      overflow: hidden;
    }

    @keyframes gradientBG {
      0% {background-position: 0% 50%;}
      50% {background-position: 100% 50%;}
      100% {background-position: 0% 50%;}
    }

    .glass {
      background: rgba(255,255,255,0.05);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.1);
    }

    .blob {
      position: absolute;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
      animation: float 8s infinite alternate;
    }

    @keyframes float {
      from { transform: translateY(-50px); }
      to { transform: translateY(50px); }
    }
  </style>
</head>

<body class="flex items-center justify-center relative">

  <!-- Background Blobs -->
  <div class="blob bg-purple-600 top-0 left-0"></div>
  <div class="blob bg-pink-600 bottom-0 right-0"></div>

  <!-- Login Box -->
  <div class="glass p-10 rounded-2xl w-96 text-white shadow-2xl z-10 transform hover:scale-105 transition duration-500">

    <h1 class="text-4xl font-bold text-center mb-6 animate-pulse">
      Nova Tube 🚀
    </h1>

    <input id="email" type="email"
      placeholder="Enter Email"
      class="w-full p-3 mb-4 rounded-lg bg-black/40 focus:ring-2 focus:ring-pink-500 outline-none">

    <input id="password" type="password"
      placeholder="Enter Password"
      class="w-full p-3 mb-4 rounded-lg bg-black/40 focus:ring-2 focus:ring-purple-500 outline-none">

    <button id="signupBtn"
      class="w-full bg-gradient-to-r from-pink-500 to-purple-600 p-3 rounded-lg mb-3 font-semibold hover:scale-110 transition">
      Sign Up
    </button>

    <button id="signinBtn"
      class="w-full bg-gradient-to-r from-blue-500 to-indigo-600 p-3 rounded-lg font-semibold hover:scale-110 transition">
      Sign In
    </button>

    <p id="message" class="text-center mt-4 text-sm text-red-400"></p>

  </div>

  <!-- Supabase Script -->
  <script type="module">
    import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

    const supabaseUrl = "https://ahhuhanjvwrltwdnrqxc.supabase.co"
    const supabaseKey = "sb_publishable_vCOpkdTBVH1d4exzr82JIQ_uNJNIzIu"

    const supabase = createClient(supabaseUrl, supabaseKey)

    const signupBtn = document.getElementById("signupBtn")
    const signinBtn = document.getElementById("signinBtn")
    const message = document.getElementById("message")

    signupBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value
      const password = document.getElementById("password").value

      if (!email || !password) {
        message.innerText = "Please fill all fields!"
        return
      }

      const { error } = await supabase.auth.signUp({
        email: email,
        password: password
      })

      if (error) {
        message.innerText = error.message
      } else {
        message.innerText = "Signup successful! Check your email."
        message.classList.remove("text-red-400")
        message.classList.add("text-green-400")
      }
    })

    signinBtn.addEventListener("click", async () => {
      const email = document.getElementById("email").value
      const password = document.getElementById("password").value

      const { error } = await supabase.auth.signInWithPassword({
        email: email,
        password: password
      })

      if (error) {
        message.innerText = error.message
      } else {
        window.location.href = "home.html"
      }
    })

    // Auto redirect if already logged in
    const { data: { session } } = await supabase.auth.getSession()
    if (session) {
      window.location.href = "home.html"
    }

  </script>

</body>
  </html>
