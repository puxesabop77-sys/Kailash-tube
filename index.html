<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kailash Tube | Premium Streaming</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0a0a0a;
            color: white;
            overflow-x: hidden;
        }

        .video-card:hover .play-overlay {
            opacity: 1;
            transform: scale(1);
        }

        .glass-nav {
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #0a0a0a; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #444; }

        .hero-gradient {
            background: linear-gradient(0deg, #0a0a0a 0%, rgba(10,10,10,0) 100%);
        }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 glass-nav px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="bg-red-600 p-1.5 rounded-lg">
                <i class="fa-solid fa-play text-white"></i>
            </div>
            <span class="text-xl font-black tracking-tighter uppercase">Kailash <span class="text-red-600">Tube</span></span>
        </div>
        
        <div class="hidden md:flex gap-8 text-sm font-medium text-gray-400">
            <a href="#" class="hover:text-white transition">Home</a>
            <a href="#" class="hover:text-white transition">Movies</a>
            <a href="#" class="hover:text-white transition">Originals</a>
            <a href="admin.html" class="opacity-0 cursor-default">Admin</a>
        </div>

        <div class="flex items-center gap-5">
            <i class="fa-solid fa-magnifying-glass cursor-pointer"></i>
            <div class="w-8 h-8 bg-gradient-to-tr from-red-600 to-orange-400 rounded-full border-2 border-gray-800"></div>
        </div>
    </nav>

    <section class="relative h-[80vh] w-full flex items-end pb-20 px-6 md:px-12">
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1616469829581-73993eb86b02?auto=format&fit=crop&q=80&w=2070" 
                 class="w-full h-full object-cover opacity-60" alt="Hero Background">
            <div class="absolute inset-0 hero-gradient"></div>
        </div>

        <div class="relative z-10 max-w-2xl animate-fade-in-up">
            <span class="bg-red-600 text-[10px] font-bold px-2 py-1 rounded uppercase tracking-widest">New Release</span>
            <h1 class="text-5xl md:text-7xl font-black mt-4 mb-6 leading-tight">THE ART OF <br>MOTION</h1>
            <p class="text-gray-300 text-lg mb-8 leading-relaxed">Experience high-quality streaming exclusively on Kailash Tube. Your favorite content, reimagined in 4K.</p>
            
            <div class="flex gap-4">
                <button class="bg-white text-black px-8 py-3 rounded-full font-bold flex items-center gap-2 hover:bg-red-600 hover:text-white transition-all duration-300">
                    <i class="fa-solid fa-play"></i> Watch Now
                </button>
                <button class="bg-gray-800/80 text-white px-8 py-3 rounded-full font-bold border border-gray-600 hover:bg-gray-700 transition">
                    Details
                </button>
            </div>
        </div>
    </section>

    <main class="px-6 md:px-12 py-12">
        <h2 class="text-2xl font-bold mb-8 flex items-center gap-3">
            <span class="w-1 h-8 bg-red-600 rounded-full"></span>
            Recently Uploaded
        </h2>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="video-container">
            <div class="video-card relative group cursor-pointer overflow-hidden rounded-xl bg-zinc-900 aspect-video">
                <img src="https://images.unsplash.com/photo-1492691527719-9d1e07e534b4?auto=format&fit=crop&q=80&w=800" 
                     class="w-full h-full object-cover transition-transform duration-500 group-hover:scale-110 opacity-80" alt="Thumbnail">
                
                <div class="play-overlay absolute inset-0 bg-black/40 flex items-center justify-center opacity-0 scale-90 transition-all duration-300">
                    <div class="w-16 h-16 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center border border-white/30">
                        <i class="fa-solid fa-play text-2xl text-white"></i>
                    </div>
                </div>

                <div class="absolute bottom-0 p-4 w-full bg-gradient-to-t from-black/90 to-transparent">
                    <h3 class="font-bold text-sm">Visual Cinematics 2026</h3>
                    <p class="text-[10px] text-gray-400 mt-1">12.4K Views • 2 hours ago</p>
                </div>
            </div>

            </div>
    </main>

    <footer class="p-12 border-t border-zinc-900 text-center text-gray-500 text-sm">
        <p>&copy; 2026 Kailash Tube. All Rights Reserved.</p>
    </footer>

    <script>
        // Simple entry animation for cards
        document.addEventListener('DOMContentLoaded', () => {
            const cards = document.querySelectorAll('.video-card');
            cards.forEach((card, index) => {
                card.style.opacity = '0';
                card.style.transform = 'translateY(20px)';
                setTimeout(() => {
                    card.style.transition = 'all 0.6s ease-out';
                    card.style.opacity = '1';
                    card.style.transform = 'translateY(0)';
                }, index * 150);
            });
        });
    </script>
</body>
</html>
