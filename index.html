<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Nova Tube</title>
  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      background-color: #141414;
    }

    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
  </style>
</head>

<body class="text-white">

<!-- 🔥 NAVBAR -->
<nav class="fixed top-0 w-full bg-gradient-to-b from-black via-black/70 to-transparent z-50 p-4 flex justify-between items-center">

  <h1 class="text-3xl font-bold text-red-600 tracking-wider">
    NOVA TUBE
  </h1>

  <button onclick="logout()"
    class="bg-red-600 px-4 py-2 rounded hover:bg-red-700 transition">
    Logout
  </button>

</nav>

<!-- 🎬 HERO SECTION -->
<section id="hero"
  class="relative h-screen flex items-end p-12 bg-cover bg-center"
  style="background-image: url('https://images.unsplash.com/photo-1497032205916-ac775f0649ae?q=80&w=2070')">

  <div class="absolute inset-0 bg-gradient-to-t from-black via-black/70 to-transparent"></div>

  <div class="relative z-10 max-w-xl">
    <h2 class="text-5xl font-bold mb-4">
      Featured Video
    </h2>

    <p class="text-lg text-gray-300 mb-6">
      Watch the latest trending content on Nova Tube.
    </p>

    <button class="bg-white text-black px-6 py-3 rounded font-semibold hover:scale-105 transition">
      ▶ Play
    </button>
  </div>

</section>

<!-- 🎥 VIDEO SECTIONS -->
<div class="relative z-20 -mt-32 px-10">

  <!-- Row 1 -->
  <h2 class="text-2xl font-semibold mb-4">Trending Now</h2>

  <div id="videoRow"
    class="flex space-x-6 overflow-x-auto scrollbar-hide pb-10">
  </div>

</div>

<!-- Supabase Script -->
<script type="module">
import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'

const supabase = createClient(
  "https://ahhuhanjvwrltwdnrqxc.supabase.co",
  "sb_publishable_vCOpkdTBVH1d4exzr82JIQ_uNJNIzIu"
)

window.logout = async function() {
  await supabase.auth.signOut()
  window.location.href = "/"
}

// Load videos
async function loadVideos() {
  const { data } = await supabase.from('videos').select('*')

  const row = document.getElementById("videoRow")

  data.forEach(video => {
    row.innerHTML += `
      <div class="min-w-[250px] group cursor-pointer transform transition duration-300 hover:scale-110">

        <div class="relative">

          <video src="${video.video_url}"
            class="rounded-lg w-full h-40 object-cover"
            muted
            onmouseover="this.play()"
            onmouseout="this.pause(); this.currentTime=0;">
          </video>

          <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition rounded-lg flex items-center justify-center">
            <span class="text-white text-2xl">▶</span>
          </div>

        </div>

        <h3 class="mt-2 text-sm font-medium">
          ${video.title}
        </h3>

      </div>
    `
  })
}

loadVideos()
</script>

</body>
  </html>
