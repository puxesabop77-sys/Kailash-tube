<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kailash Tube | Explore Videos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#0f0f0f] text-white selection:bg-red-600">

    <nav class="bg-[#0f0f0f]/95 backdrop-blur-md p-3 sticky top-0 z-50 flex justify-between items-center px-4 md:px-8">
        <div class="flex items-center gap-4">
            <i class="fas fa-bars text-xl cursor-pointer hover:bg-gray-800 p-2 rounded-full transition"></i>
            <a href="index.html" class="flex items-center gap-1 group">
                <i class="fab fa-youtube text-red-600 text-3xl transition group-hover:scale-110"></i>
                <span class="text-xl font-black tracking-tighter italic">KAILASH<span class="text-gray-400">TUBE</span></span>
            </a>
        </div>

        <div class="hidden md:flex items-center w-1/2 max-w-2xl">
            <div class="flex items-center bg-[#121212] border border-gray-700 rounded-l-full px-4 py-1.5 w-full focus-within:border-blue-500 transition">
                <input 
                    type="text" 
                    id="searchInput" 
                    placeholder="Search your favorite videos..." 
                    class="bg-transparent w-full focus:outline-none text-sm text-gray-200 placeholder-gray-500"
                >
            </div>
            <button class="bg-[#222222] border border-l-0 border-gray-700 px-5 py-[7px] rounded-r-full hover:bg-[#333333] transition">
                <i class="fas fa-search text-gray-400"></i>
            </button>
            <i class="fas fa-microphone ml-4 bg-[#181818] p-3 rounded-full hover:bg-gray-800 cursor-pointer transition"></i>
        </div>

        <div class="flex items-center gap-3 md:gap-6">
            <i class="fas fa-video text-xl cursor-pointer hover:text-red-500 transition hidden sm:block"></i>
            <i class="fas fa-bell text-xl cursor-pointer hover:text-yellow-500 transition"></i>
            <div class="w-8 h-8 rounded-full bg-gradient-to-tr from-purple-600 to-blue-500 flex items-center justify-center font-bold text-xs cursor-pointer shadow-lg border border-gray-700">S</div>
        </div>
    </nav>

    <main class="container mx-auto p-4 md:p-8">
        
        <div class="flex gap-3 overflow-x-auto pb-6 no-scrollbar">
            <span class="bg-white text-black px-4 py-1.5 rounded-lg text-sm font-bold cursor-pointer">All</span>
            <span class="bg-[#272727] px-4 py-1.5 rounded-lg text-sm font-bold cursor-pointer hover:bg-[#3f3f3f] transition">Music</span>
            <span class="bg-[#272727] px-4 py-1.5 rounded-lg text-sm font-bold cursor-pointer hover:bg-[#3f3f3f] transition">Gaming</span>
            <span class="bg-[#272727] px-4 py-1.5 rounded-lg text-sm font-bold cursor-pointer hover:bg-[#3f3f3f] transition">Live</span>
            <span class="bg-[#272727] px-4 py-1.5 rounded-lg text-sm font-bold cursor-pointer hover:bg-[#3f3f3f] transition">Software</span>
            <span class="bg-[#272727] px-4 py-1.5 rounded-lg text-sm font-bold cursor-pointer hover:bg-[#3f3f3f] transition">Bollywood</span>
        </div>

        <div id="videoGrid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-4 gap-x-4 gap-y-10">
            </div>
    </main>

    <script>
        // Load data from LocalStorage
        const videos = JSON.parse(localStorage.getItem('kailash_videos')) || [];
        const grid = document.getElementById('videoGrid');
        const searchInput = document.getElementById('searchInput');

        function renderVideos(filter = "") {
            grid.innerHTML = '';
            
            // Search Filtering
            const filtered = videos.filter(v => 
                v.title.toLowerCase().includes(filter.toLowerCase())
            );

            if(filtered.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full flex flex-col items-center justify-center py-32 opacity-30">
                        <i class="fas fa-search text-7xl mb-4"></i>
                        <p class="text-xl font-bold">No videos found for "${filter}"</p>
                    </div>
                `;
                return;
            }

            filtered.forEach((v, index) => {
                // Find actual index to maintain correct link to player
                const realIndex = videos.indexOf(v);
                
                grid.innerHTML += `
                    <div class="flex flex-col gap-3 group cursor-pointer" onclick="location.href='player.html?id=${realIndex}'">
                        <div class="relative aspect-video rounded-xl overflow-hidden bg-gray-800 transition shadow-md">
                            <img src="${v.thumb}" class="w-full h-full object-cover group-hover:scale-105 transition duration-500" loading="lazy">
                            <span class="absolute bottom-2 right-2 bg-black/80 text-[11px] px-1.5 py-0.5 rounded font-bold">12:45</span>
                        </div>
                        
                        <div class="flex gap-3 px-1">
                            <div class="w-9 h-9 rounded-full bg-red-700 flex-shrink-0 flex items-center justify-center font-bold text-sm shadow-inner">K</div>
                            <div class="flex flex-col">
                                <h3 class="font-bold text-sm leading-tight line-clamp-2 group-hover:text-red-500 transition">${v.title}</h3>
                                <div class="text-gray-400 text-xs mt-1.5 flex flex-col">
                                    <span class="hover:text-white transition">Kailash Tube <i class="fas fa-check-circle text-[10px]"></i></span>
                                    <span>8.5M views • 1 hour ago</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // Real-time Search Event
        searchInput.addEventListener('input', (e) => {
            renderVideos(e.target.value);
        });

        // Initial render on page load
        renderVideos();
    </script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            #videoGrid { gap-y: 8px; }
        }
    </style>
</body>
</html>
