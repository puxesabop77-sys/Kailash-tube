<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kailash Tube | Premium Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #050505;
            color: white;
            scroll-behavior: smooth;
        }

        .hero-gradient {
            background: linear-gradient(to top, #050505 0%, rgba(5, 5, 5, 0) 100%);
        }

        .nav-blur {
            backdrop-filter: blur(15px);
            background: rgba(5, 5, 5, 0.7);
        }

        /* Animation for Video Cards */
        .video-card {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .video-card:hover {
            transform: scale(1.05) translateY(-10px);
            box-shadow: 0 20px 40px rgba(220, 38, 38, 0.2);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #dc2626; border-radius: 10px; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-up { animation: fadeIn 0.8s ease-out forwards; }
    </style>
</head>
<body>

    <nav class="fixed top-0 w-full z-50 nav-blur border-b border-white/10 px-6 py-4 flex justify-between items-center">
        <div class="flex items-center gap-2 group cursor-pointer">
            <div class="bg-red-600 p-2 rounded-xl group-hover:rotate-12 transition-transform">
                <i class="fa-solid fa-play text-white"></i>
            </div>
            <h1 class="text-2xl font-extrabold tracking-tighter uppercase">Kailash <span class="text-red-600">Tube</span></h1>
        </div>
        
        <div class="hidden md:flex gap-8 text-sm font-medium">
            <a href="#" class="text-white hover:text-red-500 transition">Home</a>
            <a href="#" class="text-gray-400 hover:text-white transition">Movies</a>
            <a href="#" class="text-gray-400 hover:text-white transition">Originals</a>
            <a href="admin.html" class="opacity-0 hover:opacity-100 text-[10px] text-gray-700 transition">Admin</a>
        </div>

        <div class="flex items-center gap-6">
            <i class="fa-solid fa-magnifying-glass text-gray-400 cursor-pointer hover:text-white"></i>
            <div class="w-10 h-10 bg-gradient-to-br from-red-600 to-purple-700 rounded-full border-2 border-white/20 shadow-lg"></div>
        </div>
    </nav>

    <section class="relative h-[85vh] w-full flex items-center px-6 md:px-16 overflow-hidden">
        <div class="absolute inset-0 z-0">
            <img src="https://images.unsplash.com/photo-1536440136628-849c177e76a1?auto=format&fit=crop&q=80&w=2000" class="w-full h-full object-cover opacity-40 scale-110" alt="Hero">
            <div class="absolute inset-0 hero-gradient"></div>
        </div>

        <div class="relative z-10 max-w-3xl animate-up">
            <span class="bg-red-600/20 text-red-500 border border-red-600/50 text-[10px] font-bold px-3 py-1 rounded-full uppercase tracking-widest">Trending Now</span>
            <h2 class="text-6xl md:text-8xl font-black mt-4 mb-6 leading-none">LIMITLESS <br><span class="text-red-600">CINEMA.</span></h2>
            <p class="text-gray-300 text-lg mb-8 max-w-lg leading-relaxed">Experience high-definition streaming exclusively on Kailash Tube. Your vision, our platform.</p>
            
            <div class="flex gap-4">
                <button class="bg-white text-black px-10 py-4 rounded-full font-bold flex items-center gap-3 hover:bg-red-600 hover:text-white transition-all">
                    <i class="fa-solid fa-play"></i> Watch Trailer
                </button>
                <button class="bg-zinc-900/80 backdrop-blur-md text-white px-10 py-4 rounded-full font-bold border border-white/10 hover:bg-zinc-800 transition">
                    + My List
                </button>
            </div>
        </div>
    </section>

    <main class="px-6 md:px-16 py-20 relative z-10">
        <div class="flex justify-between items-end mb-12">
            <div>
                <h3 class="text-3xl font-bold">Recommended For You</h3>
                <div class="w-20 h-1.5 bg-red-600 mt-2 rounded-full"></div>
            </div>
            <p class="text-red-500 font-semibold cursor-pointer hover:underline">See All</p>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-8" id="video-container">
            </div>
    </main>

    <footer class="p-16 border-t border-white/5 text-center text-gray-600">
        <div class="flex justify-center gap-6 mb-8 text-xl">
            <i class="fa-brands fa-instagram hover:text-red-500 cursor-pointer"></i>
            <i class="fa-brands fa-youtube hover:text-red-500 cursor-pointer"></i>
            <i class="fa-brands fa-twitter hover:text-red-500 cursor-pointer"></i>
        </div>
        <p class="text-sm font-light tracking-widest uppercase">© 2026 KAILASH TUBE STUDIOS. NO LIMITS.</p>
    </footer>

    <script>
        function loadVideos() {
            const container = document.getElementById('video-container');
            const videos = JSON.parse(localStorage.getItem('kailash_vids') || "[]");

            if(videos.length === 0) {
                container.innerHTML = `
                    <div class="col-span-full py-20 text-center border-2 border-dashed border-zinc-800 rounded-3xl">
                        <i class="fa-solid fa-video-slash text-4xl text-zinc-700 mb-4"></i>
                        <p class="text-zinc-500">No videos found. Use the hidden admin to upload!</p>
                    </div>`;
                return;
            }

            container.innerHTML = videos.map((vid, index) => `
                <div class="video-card group bg-zinc-950 rounded-2xl overflow-hidden border border-white/5" style="animation: fadeIn 0.8s ease-out ${index * 0.1}s forwards; opacity: 0;">
                    <div class="relative aspect-video overflow-hidden">
                        <video controls class="w-full h-full object-cover rounded-t-2xl">
                            <source src="${vid.url}" type="video/mp4">
                        </video>
                        <div class="absolute top-2 right-2 bg-black/60 backdrop-blur-md px-2 py-1 rounded text-[10px] font-bold text-red-500">4K HDR</div>
                    </div>
                    <div class="p-5">
                        <h4 class="text-white font-bold text-lg truncate">${vid.name}</h4>
                        <div class="flex items-center gap-2 mt-2 text-gray-500 text-xs font-medium">
                            <span>${vid.date}</span>
                            <span>•</span>
                            <span class="text-zinc-300 underline cursor-pointer">Watch Now</span>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        window.onload = loadVideos;
    </script>
</body>
  </html>
