<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nova Tube Studio | Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://upload-widget.cloudinary.com/global/all.js" type="text/javascript"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body { font-family: 'Poppins', sans-serif; background: #050505; color: white; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-6">
    <div class="glass max-w-md w-full p-10 rounded-[40px] text-center border-t-4 border-red-600">
        <h2 class="text-3xl font-black mb-2 italic">NOVA <span class="text-red-600">TUBE</span></h2>
        <p class="text-gray-500 text-[10px] tracking-[0.3em] mb-10 uppercase">Admin Management</p>

        <button id="upload_widget" class="w-full bg-red-600 py-4 rounded-2xl font-bold hover:bg-red-700 transition shadow-lg shadow-red-600/20">
            <i class="fa-solid fa-cloud-arrow-up mr-2"></i> UPLOAD VIDEO
        </button>
        
        <a href="/home" class="block mt-6 text-xs text-gray-600 hover:text-white transition">Back to Home</a>
    </div>

    <script>
        // Supabase Initialization
        const supabaseUrl = 'https://ahhuhanjvwrltwdnrqxc.supabase.co';
        const supabaseKey = 'sb_publishable_vCOpkdTBVH1d4exzr82JIQ_uNJNIzIu';
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        var myWidget = cloudinary.createUploadWidget({
            cloudName: 'dh4k7hlfd', 
            uploadPreset: 'kailash_tube',
            resourceType: 'video'
        }, async (error, result) => { 
            if (!error && result && result.event === "success") { 
                // Save to Supabase for everyone to see
                const { data, error: dbError } = await _supabase
                    .from('videos')
                    .insert([{ 
                        url: result.info.secure_url, 
                        name: result.info.original_filename 
                    }]);

                if (!dbError) {
                    alert("Video Global Hogya! Sabko dikhega.");
                    window.location.href = "/home";
                } else {
                    console.error(dbError);
                    alert("Database error! Check table name.");
                }
            }
        });

        document.getElementById("upload_widget").addEventListener("click", () => myWidget.open());
    </script>
</body>
</html>
