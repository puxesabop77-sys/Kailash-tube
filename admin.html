<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kailash Tube | Secure Admin Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050505; color: white; }
        
        .drop-zone--over {
            border-color: #ef4444 !important;
            background: rgba(239, 68, 68, 0.05);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        @keyframes pulse-red {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }
        .upload-active { animation: pulse-red 2s infinite; }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <nav class="p-6 flex justify-between items-center border-b border-white/5">
        <div class="flex items-center gap-2">
            <div class="bg-red-600 p-1.5 rounded-lg">
                <i class="fa-solid fa-lock text-white text-xs"></i>
            </div>
            <span class="text-lg font-bold tracking-tighter uppercase">Admin <span class="text-red-600">Portal</span></span>
        </div>
        <a href="index.html" class="text-sm text-gray-400 hover:text-white transition">View Site <i class="fa-solid fa-arrow-up-right-from-square ml-1 text-[10px]"></i></a>
    </nav>

    <main class="flex-grow flex items-center justify-center p-6">
        <div class="max-w-4xl w-full grid md:grid-cols-3 gap-8">
            
            <div class="space-y-4">
                <div class="glass-card p-6 rounded-2xl">
                    <p class="text-gray-500 text-xs uppercase font-bold tracking-widest">Total Videos</p>
                    <h2 class="text-3xl font-black mt-1">24</h2>
                </div>
                <div class="glass-card p-6 rounded-2xl border-l-4 border-l-red-600">
                    <p class="text-gray-500 text-xs uppercase font-bold tracking-widest">Storage Used</p>
                    <h2 class="text-3xl font-black mt-1">1.2 <span class="text-sm font-normal text-gray-400">GB</span></h2>
                </div>
            </div>

            <div class="md:col-span-2">
                <div id="drop-zone" class="glass-card rounded-3xl p-12 border-2 border-dashed border-white/10 flex flex-col items-center justify-center transition-all duration-300">
                    <div class="w-20 h-20 bg-red-600/10 rounded-full flex items-center justify-center mb-6">
                        <i class="fa-solid fa-cloud-arrow-up text-3xl text-red-600"></i>
                    </div>
                    <h3 class="text-xl font-bold mb-2">Drag & Drop Video</h3>
                    <p class="text-gray-500 text-sm mb-8 text-center">MP4, WebM or OGG files supported.<br>Max file size: 500MB</p>
                    
                    <input type="file" id="file-input" class="hidden" accept="video/*">
                    <button onclick="document.getElementById('file-input').click()" class="bg-white text-black px-8 py-3 rounded-full font-bold hover:bg-red-600 hover:text-white transition-all active:scale-95">
                        Select File
                    </button>
                </div>

                <div id="upload-status" class="hidden mt-6 glass-card p-6 rounded-2xl">
                    <div class="flex justify-between mb-2">
                        <span id="file-name" class="text-sm font-medium truncate w-48 text-gray-300">video_file.mp4</span>
                        <span id="percent" class="text-sm font-bold text-red-600">0%</span>
                    </div>
                    <div class="w-full bg-white/5 rounded-full h-1.5 overflow-hidden">
                        <div id="progress-bar" class="bg-red-600 h-full w-0 transition-all duration-300"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="p-8 text-center text-gray-600 text-[10px] tracking-widest uppercase">
        Kailash Tube Internal Management System v2.0
    </footer>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('file-input');
        const uploadStatus = document.getElementById('upload-status');
        const progressBar = document.getElementById('progress-bar');
        const percentText = document.getElementById('percent');
        const fileNameText = document.getElementById('file-name');

        // Drag and Drop Logic
        ['dragover', 'dragleave', 'drop'].forEach(event => {
            dropZone.addEventListener(event, (e) => {
                e.preventDefault();
                if (event === 'dragover') dropZone.classList.add('drop-zone--over');
                else dropZone.classList.remove('drop-zone--over');
            });
        });

        dropZone.addEventListener('drop', (e) => {
            const files = e.dataTransfer.files;
            if (files.length) handleUpload(files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (fileInput.files.length) handleUpload(fileInput.files[0]);
        });

        function handleUpload(file) {
            if (!file.type.startsWith('video/')) {
                alert('Please upload a valid video file.');
                return;
            }

            // Show progress UI
            uploadStatus.classList.remove('hidden');
            fileNameText.innerText = file.name;
            dropZone.classList.add('upload-active');

            // Simulate Upload (Since this is frontend-only)
            let progress = 0;
            const interval = setInterval(() => {
                progress += Math.random() * 15;
                if (progress >= 100) {
                    progress = 100;
                    clearInterval(interval);
                    completeUpload();
                }
                progressBar.style.width = progress + '%';
                percentText.innerText = Math.floor(progress) + '%';
            }, 400);
        }

        function completeUpload() {
            setTimeout(() => {
                alert('Success! Video has been added to Kailash Tube.');
                uploadStatus.classList.add('hidden');
                dropZone.classList.remove('upload-active');
                progressBar.style.width = '0%';
            }, 500);
        }
    </script>
</body>
  </html>
