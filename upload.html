<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kailash Tube | Cloud Upload</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#050505] text-white font-sans min-h-screen flex items-center justify-center p-4">

    <div class="w-full max-w-2xl bg-[#0f0f0f] rounded-3xl border border-gray-800 shadow-2xl overflow-hidden fade-in">
        
        <div class="p-6 border-b border-gray-800 flex justify-between items-center bg-[#181818]">
            <h2 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-cloud-upload-alt text-red-600"></i> Upload New Video
            </h2>
            <a href="admin.html" class="text-xs text-gray-500 hover:text-white transition">Cancel</a>
        </div>

        <div class="p-8 space-y-8">
            <div class="border-2 border-dashed border-gray-700 rounded-2xl p-10 text-center hover:border-red-500 transition-all group bg-[#121212]">
                <i class="fas fa-file-video text-5xl text-gray-600 group-hover:text-red-600 transition mb-4"></i>
                <p class="text-gray-400 font-medium">Video Data Entry Mode</p>
                <p class="text-[10px] text-gray-600 mt-1 uppercase tracking-widest">Kailash Tube Core Engine</p>
            </div>

            <div class="grid grid-cols-1 gap-6">
                <div class="relative">
                    <label class="text-[10px] uppercase font-bold text-gray-500 mb-1 block">Video Title</label>
                    <input type="text" id="up_title" placeholder="e.g. My Awesome Vlog #1" 
                        class="w-full bg-[#181818] p-4 rounded-xl border border-gray-800 focus:border-red-600 outline-none text-sm transition">
                </div>

                <div class="relative">
                    <label class="text-[10px] uppercase font-bold text-gray-500 mb-1 block">MP4 URL (Direct Link)</label>
                    <input type="text" id="up_url" placeholder="https://storage.com/video.mp4" 
                        class="w-full bg-[#181818] p-4 rounded-xl border border-gray-800 focus:border-red-600 outline-none text-sm transition font-mono">
                </div>

                <div class="relative">
                    <label class="text-[10px] uppercase font-bold text-gray-500 mb-1 block">Thumbnail URL</label>
                    <input type="text" id="up_thumb" placeholder="https://image.com/preview.jpg" 
                        class="w-full bg-[#181818] p-4 rounded-xl border border-gray-800 focus:border-red-600 outline-none text-sm transition">
                </div>
            </div>

            <div class="pt-4">
                <button onclick="startUpload()" id="up_btn" class="w-full bg-red-600 py-4 rounded-xl font-black text-sm tracking-widest hover:bg-red-700 shadow-lg shadow-red-900/20 active:scale-95 transition-all">
                    PUBLISH VIDEO
                </button>
                
                <div id="progress_container" class="hidden mt-6 space-y-2">
                    <div class="flex justify-between text-[10px] font-bold">
                        <span id="status">UPLOADING TO DATABASE...</span>
                        <span id="percent">0%</span>
                    </div>
                    <div class="w-full bg-gray-800 h-1.5 rounded-full overflow-hidden">
                        <div id="bar" class="bg-red-600 h-full w-0 transition-all duration-300"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function startUpload() {
            const title = document.getElementById('up_title').value;
            const url = document.getElementById('up_url').value;
            const thumb = document.getElementById('up_thumb').value;

            if(!title || !url) {
                alert("Oye bro, Title aur URL toh daal!");
                return;
            }

            // Show Progress UI
            document.getElementById('up_btn').classList.add('hidden');
            document.getElementById('progress_container').classList.remove('hidden');

            let p = 0;
            const bar = document.getElementById('bar');
            const percent = document.getElementById('percent');
            const status = document.getElementById('status');

            // Fake Upload Animation (Feel ke liye)
            const interval = setInterval(() => {
                p += Math.floor(Math.random() * 20) + 5;
                if(p >= 100) {
                    p = 100;
                    clearInterval(interval);
                    status.innerText = "SUCCESSFULLY DEPLOYED!";
                    saveToDB(title, url, thumb);
                }
                bar.style.width = p + "%";
                percent.innerText = p + "%";
            }, 300);
        }

        function saveToDB(title, url, thumb) {
            let videos = JSON.parse(localStorage.getItem('kailash_videos')) || [];
            videos.unshift({ 
                title: title, 
                url: url, 
                thumb: thumb || 'https://via.placeholder.com/640x360/111/fff?text=Kailash+Tube' 
            });
            localStorage.setItem('kailash_videos', JSON.stringify(videos));

            setTimeout(() => {
                window.location.href = 'admin.html'; // Wapas admin panel pe bhej dega
            }, 1000);
        }
    </script>

</body>
  </html>
