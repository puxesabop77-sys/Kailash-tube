<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kailash Tube | Playing...</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-white selection:bg-red-500">

    <nav class="p-4 bg-gray-900/80 backdrop-blur-md sticky top-0 z-50 border-b border-gray-800">
        <div class="container mx-auto flex justify-between items-center">
            <a href="index.html" class="text-2xl font-black text-red-600 tracking-tighter italic hover:scale-105 transition">
                KAILASH <span class="text-white underline decoration-red-600">TUBE</span>
            </a>
            <div class="flex gap-4 items-center">
                <i class="fas fa-search text-gray-400 cursor-pointer hover:text-white"></i>
                <div class="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center font-bold text-xs">S</div>
            </div>
        </div>
    </nav>

    <div class="container mx-auto mt-6 flex flex-col lg:flex-row gap-8 p-4">
        
        <div class="lg:w-[70%]">
            <div class="group relative rounded-2xl overflow-hidden shadow-2xl border border-gray-800 bg-gray-900">
                <video 
                    id="kailash-video" 
                    class="video-js vjs-big-play-centered vjs-theme-city w-full aspect-video"
                    controls 
                    preload="auto"
                    data-setup='{}'>
                    <source id="videoSource" src="" type="video/mp4">
                    <p class="vjs-no-js">To view this video please enable JavaScript.</p>
                </video>
            </div>

            <div class="mt-6">
                <h1 id="vTitle" class="text-2xl font-bold leading-tight">Video Title Loading...</h1>
                
                <div class="flex flex-wrap items-center justify-between gap-4 mt-4 py-4 border-b border-gray-800">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-full bg-gradient-to-br from-red-600 to-red-900 flex items-center justify-center font-black text-xl shadow-lg">K</div>
                        <div>
                            <h4 class="font-bold text-md flex items-center gap-1">
                                Kailash Tube <i class="fas fa-check-circle text-blue-400 text-[10px]"></i>
                            </h4>
                            <p class="text-gray-500 text-xs">1.2M subscribers</p>
                        </div>
                        <button class="ml-4 bg-white text-black px-6 py-2 rounded-full font-bold text-sm hover:bg-red-500 hover:text-white transition-all transform active:scale-90">Subscribe</button>
                    </div>

                    <div class="flex items-center gap-2">
                        <div class="flex bg-gray-800 rounded-full overflow-hidden">
                            <button class="hover:bg-gray-700 px-4 py-2 border-r border-gray-700 text-sm font-bold flex items-center gap-2">
                                <i class="far fa-thumbs-up text-lg"></i> 12K
                            </button>
                            <button class="hover:bg-gray-700 px-4 py-2 text-sm">
                                <i class="far fa-thumbs-down text-lg"></i>
                            </button>
                        </div>
                        <button class="bg-gray-800 hover:bg-gray-700 px-5 py-2 rounded-full text-sm font-bold flex items-center gap-2">
                            <i class="fas fa-share"></i> Share
                        </button>
                    </div>
                </div>

                <div class="mt-4 p-4 bg-gray-800/50 rounded-xl hover:bg-gray-800 transition cursor-pointer">
                    <p class="text-sm font-bold mb-1">104K views &nbsp; 2 days ago</p>
                    <p id="vDesc" class="text-sm text-gray-300 leading-relaxed">
                        Welcome to Kailash Tube! Is video mein humne dekha ki kaise ek full-fledged player kaam karta hai. 
                        #KailashTube #WebDev #VideoPlayer
                    </p>
                </div>
            </div>
        </div>

        <div class="lg:w-[30%]">
            <h3 class="text-sm font-bold text-gray-400 uppercase tracking-widest mb-4 flex items-center gap-2">
                <span class="w-2 h-2 bg-red-600 rounded-full animate-pulse"></span> Up Next
            </h3>
            <div id="sideList" class="space-y-4">
                </div>
        </div>

    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const videoId = urlParams.get('id');
        const videos = JSON.parse(localStorage.getItem('kailash_videos')) || [];
        const player = videojs('kailash-video');

        if (videoId !== null && videos[videoId]) {
            const v = videos[videoId];
            
            // Set Video Source
            player.src({ type: 'video/mp4', src: v.url });
            document.getElementById('vTitle').innerText = v.title;
            document.title = v.title + " | Kailash Tube";

            // Keyboard Shortcuts
            window.addEventListener('keydown', (e) => {
                if(e.code === 'Space') {
                    e.preventDefault();
                    player.paused() ? player.play() : player.pause();
                }
                if(e.code === 'ArrowRight') player.currentTime(player.currentTime() + 5);
                if(e.code === 'ArrowLeft') player.currentTime(player.currentTime() - 5);
            });
        } else {
            window.location.href = 'index.html';
        }

        // Render Sidebar
        const sideList = document.getElementById('sideList');
        videos.forEach((v, i) => {
            if(i != videoId) {
                sideList.innerHTML += `
                    <div class="flex gap-3 cursor-pointer group rounded-lg p-1 hover:bg-gray-900 transition" onclick="location.href='player.html?id=${i}'">
                        <div class="relative flex-shrink-0">
                            <img src="${v.thumb}" class="w-40 h-24 object-cover rounded-lg group-hover:opacity-80">
                            <span class="absolute bottom-1 right-1 bg-black/80 text-[10px] px-1 rounded">10:00</span>
                        </div>
                        <div class="flex flex-col justify-start">
                            <h4 class="text-sm font-bold line-clamp-2 leading-tight group-hover:text-red-500 transition">${v.title}</h4>
                            <p class="text-[11px] text-gray-500 mt-1 font-semibold">Kailash Tube <i class="fas fa-check-circle"></i></p>
                            <p class="text-[10px] text-gray-600">45K views • 1 month ago</p>
                        </div>
                    </div>
                `;
            }
        });
    </script>

    <style>
        /* Video.js Theme Customization */
        .video-js { width: 100% !important; height: auto !important; }
        .vjs-theme-city .vjs-big-play-button {
            background-color: rgba(220, 38, 38, 0.8);
            border-radius: 50%;
            width: 2em; height: 2em; line-height: 2em;
        }
        .vjs-theme-city .vjs-play-progress { background-color: #ef4444; }
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
    </style>
</body>
                          </html>
