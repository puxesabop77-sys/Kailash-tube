<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Nova Tube Player</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{--red:#e50914;--red2:#ff1f1f;--cb:rgba(255,255,255,0.12);--ch:rgba(255,255,255,0.22);}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
html,body{width:100%;height:100%;background:#000;font-family:'Inter',sans-serif;overflow:hidden;color:#fff;}
#shell{position:fixed;inset:0;background:#000;cursor:none;}
#shell.sc{cursor:default;}
#mv{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;background:#000;z-index:1;}
.gt,.gb{position:absolute;left:0;right:0;pointer-events:none;z-index:3;opacity:0;transition:opacity .4s;}
.gt{top:0;height:180px;background:linear-gradient(to bottom,rgba(0,0,0,.85),transparent);}
.gb{bottom:0;height:260px;background:linear-gradient(to top,rgba(0,0,0,.9),transparent);}
#shell.uv .gt,#shell.uv .gb{opacity:1;}
.topbar{position:absolute;top:0;left:0;right:0;z-index:10;display:flex;align-items:center;gap:16px;padding:22px 28px 0;opacity:0;transform:translateY(-16px);transition:opacity .35s,transform .35s;pointer-events:none;}
#shell.uv .topbar{opacity:1;transform:translateY(0);pointer-events:all;}
.backbtn{width:46px;height:46px;border-radius:50%;background:rgba(0,0,0,.5);border:1.5px solid rgba(255,255,255,.2);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);flex-shrink:0;transition:background .2s,transform .15s;}
.backbtn:hover{background:rgba(255,255,255,.15);transform:scale(1.05);}
.backbtn svg{width:20px;height:20px;}
.topinfo{flex:1;min-width:0;}
.topseries{font-size:11px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:3px;}
.toptitle{font-size:18px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.2;}
.topmeta{font-size:12px;color:rgba(255,255,255,.45);margin-top:3px;}
.topright{display:flex;align-items:center;gap:10px;}
.topbtn{height:38px;padding:0 15px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.2);color:rgba(255,255,255,.85);border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;font-size:13px;font-weight:600;backdrop-filter:blur(8px);display:flex;align-items:center;gap:7px;transition:background .2s;white-space:nowrap;}
.topbtn:hover{background:rgba(255,255,255,.15);}
.topbtn svg{width:15px;height:15px;fill:currentColor;}
.czone{position:absolute;inset:0;z-index:5;display:flex;}
.zl,.zm,.zr{flex:1;}
.zm{cursor:pointer;}
.crip{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:20;pointer-events:none;opacity:0;}
.crip.pop{animation:cPop .55s cubic-bezier(.16,1,.3,1) forwards;}
@keyframes cPop{0%{opacity:1;transform:translate(-50%,-50%) scale(.5)}40%{opacity:1;transform:translate(-50%,-50%) scale(1.1)}100%{opacity:0;transform:translate(-50%,-50%) scale(1.3)}}
.rdisc{width:88px;height:88px;border-radius:50%;background:rgba(255,255,255,.15);border:2px solid rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.rdisc svg{width:34px;fill:#fff;}
.skip-r{position:absolute;top:50%;z-index:20;transform:translateY(-50%);pointer-events:none;opacity:0;display:flex;flex-direction:column;align-items:center;gap:6px;}
.skip-r.l{left:10%;}
.skip-r.r{right:10%;}
.skip-r.pop{animation:sPop .6s ease forwards;}
@keyframes sPop{0%{opacity:1;transform:translateY(-50%) scale(.75)}35%{opacity:1;transform:translateY(-50%) scale(1.05)}100%{opacity:0;transform:translateY(-50%) scale(1.15)}}
.sdisc{width:72px;height:72px;border-radius:50%;background:rgba(255,255,255,.12);border:2px solid rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.sdisc svg{width:30px;fill:#fff;}
.slbl{font-size:12px;font-weight:800;color:#fff;letter-spacing:.5px;}
.spin{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:15;display:none;}
.spin.on{display:block;}
.sring{width:56px;height:56px;border-radius:50%;border:4px solid rgba(255,255,255,.1);border-top-color:var(--red);animation:sp .75s linear infinite;}
@keyframes sp{to{transform:rotate(360deg)}}
.btmctrl{position:absolute;bottom:0;left:0;right:0;z-index:10;padding:0 28px 28px;opacity:0;transform:translateY(16px);transition:opacity .35s,transform .35s;pointer-events:none;}
#shell.uv .btmctrl{opacity:1;transform:translateY(0);pointer-events:all;}
.aboveprog{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px;padding:0 2px;}
.nplbl{font-size:11px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;color:rgba(255,255,255,.4);}
.tdisp{font-size:14px;font-weight:700;letter-spacing:.5px;font-variant-numeric:tabular-nums;}
.tdisp .sep{color:rgba(255,255,255,.3);margin:0 4px;}
.progout{position:relative;height:22px;display:flex;align-items:center;cursor:pointer;margin-bottom:18px;}
.progtrack{position:absolute;left:0;right:0;height:4px;border-radius:2px;background:rgba(255,255,255,.2);overflow:visible;transition:height .15s,border-radius .15s;}
.progout:hover .progtrack{height:6px;border-radius:3px;}
.progbuf{position:absolute;left:0;top:0;height:100%;background:rgba(255,255,255,.3);border-radius:inherit;pointer-events:none;}
.progfill{position:absolute;left:0;top:0;height:100%;background:var(--red);border-radius:inherit;pointer-events:none;}
.progthumb{position:absolute;top:50%;width:16px;height:16px;border-radius:50%;background:#fff;transform:translate(-50%,-50%) scale(0);transition:transform .15s;pointer-events:none;box-shadow:0 2px 8px rgba(0,0,0,.5);z-index:2;}
.progout:hover .progthumb{transform:translate(-50%,-50%) scale(1);}
.seektip{position:absolute;bottom:28px;background:rgba(20,20,20,.95);border:1px solid rgba(255,255,255,.1);color:#fff;font-size:12px;font-weight:700;padding:5px 10px;border-radius:6px;pointer-events:none;white-space:nowrap;transform:translateX(-50%);opacity:0;transition:opacity .15s;backdrop-filter:blur(6px);}
.progout:hover .seektip{opacity:1;}
.ctrlrow{display:flex;align-items:center;gap:4px;}
.cb{width:44px;height:44px;border-radius:50%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff;flex-shrink:0;transition:background .15s,transform .1s;position:relative;}
.cb:hover{background:var(--cb);}
.cb:active{transform:scale(.88);}
.cb svg{width:24px;height:24px;fill:#fff;pointer-events:none;}
.cb.lg svg{width:30px;height:30px;}
.cb[data-tip]::after{content:attr(data-tip);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:rgba(20,20,20,.92);color:#fff;font-size:11px;font-weight:700;letter-spacing:.5px;padding:5px 10px;border-radius:6px;white-space:nowrap;pointer-events:none;opacity:0;transition:opacity .15s;backdrop-filter:blur(6px);border:1px solid rgba(255,255,255,.1);}
.cb[data-tip]:hover::after{opacity:1;}
.volc{display:flex;align-items:center;border-radius:30px;padding:0 4px;transition:background .2s;}
.volc:hover{background:rgba(255,255,255,.08);}
.volsw{width:0;overflow:hidden;transition:width .28s ease;display:flex;align-items:center;}
.volc:hover .volsw{width:88px;}
input[type=range].vr{-webkit-appearance:none;appearance:none;width:80px;height:3px;background:rgba(255,255,255,.25);border-radius:2px;outline:none;cursor:pointer;margin:0 6px;}
input[type=range].vr::-webkit-slider-thumb{-webkit-appearance:none;width:13px;height:13px;border-radius:50%;background:#fff;cursor:pointer;}
.csp{flex:1;}
.rc{display:flex;align-items:center;gap:4px;}
.spw{position:relative;}
.sppill{height:34px;padding:0 13px;background:var(--cb);border:1px solid rgba(255,255,255,.18);border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;font-weight:800;color:#fff;letter-spacing:.5px;transition:background .15s;white-space:nowrap;}
.sppill:hover{background:var(--ch);}
.spmenu{display:none;position:absolute;bottom:calc(100% + 10px);right:0;background:#1c1c1c;border:1px solid rgba(255,255,255,.12);border-radius:12px;overflow:hidden;min-width:130px;box-shadow:0 16px 50px rgba(0,0,0,.8);}
.spw:hover .spmenu{display:block;}
.sopt{padding:12px 18px;font-size:13px;font-weight:600;color:rgba(255,255,255,.7);cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:background .15s;}
.sopt:hover{background:rgba(255,255,255,.07);color:#fff;}
.sopt.on{color:var(--red);font-weight:800;}
.sopt .sc{font-size:14px;opacity:0;}
.sopt.on .sc{opacity:1;}
.qpill{height:34px;padding:0 11px;background:var(--cb);border:1px solid rgba(255,255,255,.18);border-radius:6px;cursor:pointer;font-family:'Inter',sans-serif;font-size:11px;font-weight:800;color:#fff;letter-spacing:1px;text-transform:uppercase;transition:background .15s;}
.qpill:hover{background:var(--ch);}
.unnext{display:none;position:absolute;z-index:30;bottom:120px;right:28px;width:280px;}
.unnext.on{display:block;animation:suN .4s cubic-bezier(.16,1,.3,1) both;}
@keyframes suN{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.uncard{background:rgba(20,20,20,.95);border:1px solid rgba(255,255,255,.1);border-radius:14px;overflow:hidden;backdrop-filter:blur(16px);box-shadow:0 20px 60px rgba(0,0,0,.7);}
.unthumb{width:100%;aspect-ratio:16/9;background:linear-gradient(135deg,#1a0505,#0d0d1a);display:flex;align-items:center;justify-content:center;font-size:32px;position:relative;overflow:hidden;}
.unthumb img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0;}
.unring{position:absolute;bottom:10px;right:10px;width:42px;height:42px;}
.unring svg{width:42px;height:42px;transform:rotate(-90deg);}
.rbg{fill:none;stroke:rgba(255,255,255,.2);stroke-width:3;}
.rfill{fill:none;stroke:var(--red);stroke-width:3;stroke-dasharray:110;stroke-dashoffset:110;stroke-linecap:round;transition:stroke-dashoffset .9s linear;}
.rnum{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:900;}
.unbody{padding:14px 16px;}
.unlbl{font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(255,255,255,.4);text-transform:uppercase;margin-bottom:5px;}
.untitle{font-size:14px;font-weight:800;margin-bottom:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.unbtns{display:flex;gap:8px;}
.unpb{flex:1;padding:9px 0;background:var(--red);border:none;border-radius:8px;color:#fff;font-family:'Inter',sans-serif;font-size:12px;font-weight:800;cursor:pointer;transition:background .15s;display:flex;align-items:center;justify-content:center;gap:5px;}
.unpb:hover{background:var(--red2);}
.uncb{padding:9px 14px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:rgba(255,255,255,.7);font-family:'Inter',sans-serif;font-size:12px;font-weight:700;cursor:pointer;transition:background .15s;}
.uncb:hover{background:rgba(255,255,255,.14);}
#loadscr{position:fixed;inset:0;z-index:100;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;}
#loadscr.gone{display:none;}
.llogo{font-size:32px;font-weight:900;color:var(--red);letter-spacing:-1px;}
.llogo span{color:#fff;}
.lbarbg{width:200px;height:3px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden;}
.lbar{height:100%;width:0%;background:var(--red);border-radius:2px;animation:la 1.4s ease forwards;}
@keyframes la{to{width:100%}}
#errscr{display:none;position:fixed;inset:0;z-index:90;background:#0a0a0a;flex-direction:column;align-items:center;justify-content:center;gap:16px;text-align:center;padding:20px;}
#errscr.on{display:flex;}
.eico{font-size:52px;opacity:.4;}
.etitle{font-size:22px;font-weight:800;}
.emsg{font-size:14px;color:#888;max-width:320px;line-height:1.5;}
.ebtn{margin-top:8px;padding:12px 28px;background:var(--red);border:none;border-radius:8px;color:#fff;font-family:'Inter',sans-serif;font-size:14px;font-weight:800;cursor:pointer;}
</style>
</head>
<body>
<div id="loadscr"><div class="llogo">NOVA<span>TUBE</span></div><div class="lbarbg"><div class="lbar"></div></div></div>
<div id="errscr"><div class="eico">&#9888;&#65039;</div><div class="etitle">Playback Error</div><div class="emsg" id="emsg">Video could not be loaded.</div><button class="ebtn" onclick="goBack()">Go Back</button></div>
<div id="shell">
  <video id="mv" preload="auto" playsinline ontimeupdate="onTU()" onwaiting="showSpin()" oncanplay="hideSpin()" onplay="onPlay()" onpause="onPause()" onended="onEnd()" onloadedmetadata="onMeta()" onerror="onErr()"></video>
  <div class="gt"></div><div class="gb"></div>
  <div class="topbar">
    <button class="backbtn" onclick="goBack()">
      <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <div class="topinfo">
      <div class="topseries">NOVA TUBE</div>
      <div class="toptitle" id="tt">Loading...</div>
      <div class="topmeta" id="tm"></div>
    </div>
    <div class="topright">
      <button class="topbtn" id="likeBtn" onclick="toggleLike()">
        <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
        My List
      </button>
      <button class="topbtn" id="shareBtn" onclick="doShare()">
        <svg viewBox="0 0 24 24"><path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92s2.92-1.31 2.92-2.92c0-1.61-1.31-2.92-2.92-2.92z"/></svg>
        Share
      </button>
    </div>
  </div>
  <div class="czone">
    <div class="zl" ondblclick="doSkip(-10)"></div>
    <div class="zm" onclick="togglePlay()"></div>
    <div class="zr" ondblclick="doSkip(10)"></div>
  </div>
  <div class="spin" id="spin"><div class="sring"></div></div>
  <div class="crip" id="cr"><div class="rdisc" id="rd"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div></div>
  <div class="skip-r l" id="srl"><div class="sdisc"><svg viewBox="0 0 24 24"><path d="M11 18V6l-8.5 6 8.5 6zm.5-6l8.5 6V6l-8.5 6z"/></svg></div><div class="slbl">-10 sec</div></div>
  <div class="skip-r r" id="srr"><div class="sdisc"><svg viewBox="0 0 24 24"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg></div><div class="slbl">+10 sec</div></div>
  <div class="unnext" id="unn">
    <div class="uncard">
      <div class="unthumb" id="unth">
        <div class="unring"><svg viewBox="0 0 42 42"><circle class="rbg" cx="21" cy="21" r="17.5"/><circle class="rfill" id="rf" cx="21" cy="21" r="17.5"/></svg><div class="rnum" id="rn">5</div></div>
      </div>
      <div class="unbody">
        <div class="unlbl">Up Next</div>
        <div class="untitle" id="untit">Next Video</div>
        <div class="unbtns">
          <button class="unpb" onclick="playNext()">Play Now</button>
          <button class="uncb" onclick="cancelNext()">Cancel</button>
        </div>
      </div>
    </div>
  </div>
  <div class="btmctrl">
    <div class="aboveprog">
      <div class="nplbl" id="npl">Now Playing</div>
      <div class="tdisp"><span id="tc">0:00</span><span class="sep">/</span><span id="td">0:00</span></div>
    </div>
    <div class="progout" id="po" onmousemove="onPH(event)" onclick="onPC(event)" onmousedown="startS(event)">
      <div class="progtrack">
        <div class="progbuf" id="pb"></div>
        <div class="progfill" id="pf"></div>
      </div>
      <div class="progthumb" id="pt"></div>
      <div class="seektip" id="st">0:00</div>
    </div>
    <div class="ctrlrow">
      <button class="cb lg" onclick="togglePlay()" data-tip="Play / Pause"><svg id="pp" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></button>
      <button class="cb" onclick="doSkip(-10)" data-tip="Rewind 10s"><svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg></button>
      <button class="cb" onclick="doSkip(10)" data-tip="Forward 10s"><svg viewBox="0 0 24 24"><path d="M12 5V1l5 5-5 5V7c-3.31 0-6 2.69-6 6s2.69 6 6 6 6-2.69 6-6h2c0 4.42-3.58 8-8 8s-8-3.58-8-8 3.58-8 8-8z"/></svg></button>
      <div class="volc">
        <button class="cb" onclick="toggleMute()" data-tip="Mute"><svg id="vs" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg></button>
        <div class="volsw"><input type="range" class="vr" id="vr" min="0" max="1" step="0.01" value="1" oninput="setVol(this.value)"></div>
      </div>
      <div class="csp"></div>
      <div class="rc">
        <div class="spw">
          <button class="sppill" id="spb">1x Speed</button>
          <div class="spmenu">
            <div class="sopt" data-s="0.25" onclick="setSpeed(0.25)">0.25x<span class="sc">v</span></div>
            <div class="sopt" data-s="0.5" onclick="setSpeed(0.5)">0.5x<span class="sc">v</span></div>
            <div class="sopt" data-s="0.75" onclick="setSpeed(0.75)">0.75x<span class="sc">v</span></div>
            <div class="sopt on" data-s="1" onclick="setSpeed(1)">Normal<span class="sc">v</span></div>
            <div class="sopt" data-s="1.25" onclick="setSpeed(1.25)">1.25x<span class="sc">v</span></div>
            <div class="sopt" data-s="1.5" onclick="setSpeed(1.5)">1.5x<span class="sc">v</span></div>
            <div class="sopt" data-s="2" onclick="setSpeed(2)">2x<span class="sc">v</span></div>
          </div>
        </div>
        <button class="qpill">HD</button>
        <button class="cb" onclick="togglePiP()" data-tip="Picture in Picture"><svg viewBox="0 0 24 24"><path d="M19 11h-8v6h8v-6zm4 8V4.98C23 3.88 22.1 3 21 3H3C1.9 3 1 3.88 1 4.98V19c0 1.1.9 2 2 2h18c1.1 0 2-.9 2-2zm-2 .02H3V4.97h18v14.05z"/></svg></button>
        <button class="cb" onclick="toggleFS()" data-tip="Fullscreen"><svg id="fsi" viewBox="0 0 24 24"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const {createClient}=supabase;
const sb=createClient('https://ahhuhanjvwrltwdnrqxc.supabase.co','sb_publishable_vCOpkdTBVH1d4exzr82JIQ_uNJNIzIu');
const vid=document.getElementById('mv');
const shell=document.getElementById('shell');
const P='M8 5v14l11-7z',PA='M6 19h4V5H6v14zm8-14v14h4V5h-4z';
const VD='M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z';
const MD='M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z';
let allV=[],curI=-1,curV=null,ctT=null,scr=false,unT=null,unC=5,liked=false;
(async()=>{
  const {data:{session}}=await sb.auth.getSession();
  if(!session){window.location.href='index.html';return;}
  const params=new URLSearchParams(window.location.search);
  const id=params.get('id');
  const {data}=await sb.from('videos').select('*').order('created_at',{ascending:false});
  allV=data||[];
  if(id){curI=allV.findIndex(v=>v.id===id);}
  if(curI===-1) curI=0;
  if(allV.length>0){loadV(allV[curI]);}else{showErr('No videos available.');}
  setTimeout(()=>document.getElementById('loadscr').classList.add('gone'),1400);
})();
function loadV(v){
  curV=v;vid.src=v.video_url||'';vid.load();vid.play().catch(()=>{});
  document.getElementById('tt').textContent=v.title||'Untitled';
  document.getElementById('tm').textContent=(v.channel_name||'Nova Tube')+' • '+fmtD(v.created_at);
  document.getElementById('npl').textContent=v.title||'Now Playing';
  document.title=(v.title||'Nova Tube')+' — Nova Tube';
  showUI();sb.from('videos').update({views:(v.views||0)+1}).eq('id',v.id);
}
function showUI(){shell.classList.add('uv','sc');clearTimeout(ctT);ctT=setTimeout(hideUI,4000);}
function hideUI(){if(!vid.paused){shell.classList.remove('uv','sc');}}
shell.addEventListener('mousemove',showUI);
shell.addEventListener('touchstart',showUI,{passive:true});
function togglePlay(){if(vid.paused){vid.play();ripple(false);}else{vid.pause();ripple(true);}showUI();}
function onPlay(){document.getElementById('pp').innerHTML='<path d="'+PA+'"/>';}
function onPause(){document.getElementById('pp').innerHTML='<path d="'+P+'"/>';}
function ripple(isPause){
  const el=document.getElementById('cr'),d=document.getElementById('rd');
  d.innerHTML=isPause?'<svg viewBox="0 0 24 24" width="34" fill="#fff"><path d="'+PA+'"/></svg>':'<svg viewBox="0 0 24 24" width="34" fill="#fff"><path d="'+P+'"/></svg>';
  el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');
}
function skipRip(dir){const el=dir<0?document.getElementById('srl'):document.getElementById('srr');el.classList.remove('pop');void el.offsetWidth;el.classList.add('pop');}
function doSkip(s){vid.currentTime=Math.max(0,Math.min(vid.duration||0,vid.currentTime+s));skipRip(s);showUI();}
function onTU(){
  if(!vid.duration||scr)return;
  const p=vid.currentTime/vid.duration;
  document.getElementById('pf').style.width=(p*100)+'%';
  document.getElementById('pt').style.left=(p*100)+'%';
  document.getElementById('tc').textContent=fmt(vid.currentTime);
  if(vid.buffered.length>0)document.getElementById('pb').style.width=(vid.buffered.end(vid.buffered.length-1)/vid.duration*100)+'%';
}
function onMeta(){document.getElementById('td').textContent=fmt(vid.duration);}
function onPH(e){const r=document.getElementById('po').getBoundingClientRect(),p=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)),t=document.getElementById('st');t.textContent=fmt((vid.duration||0)*p);t.style.left=(p*100)+'%';}
function onPC(e){if(!vid.duration)return;const r=document.getElementById('po').getBoundingClientRect();vid.currentTime=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width))*vid.duration;}
function startS(e){scr=true;document.addEventListener('mousemove',midS);document.addEventListener('mouseup',endS);}
function midS(e){if(!scr||!vid.duration)return;const r=document.getElementById('po').getBoundingClientRect(),p=Math.max(0,Math.min(1,(e.clientX-r.left)/r.width));vid.currentTime=p*vid.duration;document.getElementById('pf').style.width=(p*100)+'%';document.getElementById('pt').style.left=(p*100)+'%';document.getElementById('tc').textContent=fmt(vid.currentTime);}
function endS(){scr=false;document.removeEventListener('mousemove',midS);document.removeEventListener('mouseup',endS);}
function setVol(v){vid.volume=v;vid.muted=+v===0;updV();}
function toggleMute(){vid.muted=!vid.muted;document.getElementById('vr').value=vid.muted?0:vid.volume;updV();}
function updV(){document.getElementById('vs').innerHTML=(vid.muted||vid.volume===0)?'<path d="'+MD+'"/>':'<path d="'+VD+'"/>';}
function setSpeed(s){vid.playbackRate=s;document.getElementById('spb').textContent=s===1?'1x Speed':s+'x Speed';document.querySelectorAll('.sopt').forEach(el=>el.classList.toggle('on',parseFloat(el.dataset.s)===s));}
function toggleFS(){if(!document.fullscreenElement)shell.requestFullscreen&&shell.requestFullscreen();else document.exitFullscreen&&document.exitFullscreen();}
document.addEventListener('fullscreenchange',()=>{const fs=!!document.fullscreenElement;document.getElementById('fsi').innerHTML=fs?'<path d="M5 16h3v3h2v-5H5v2zm3-8H5v2h5V5H8v3zm6 11h2v-3h3v-2h-5v5zm2-11V5h-2v5h5V8h-3z"/>':'<path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>';});
async function togglePiP(){if(document.pictureInPictureElement)await document.exitPictureInPicture();else await vid.requestPictureInPicture&&vid.requestPictureInPicture();}
function onEnd(){
  const ni=curI+1;
  if(ni<allV.length){
    const nv=allV[ni];document.getElementById('untit').textContent=nv.title;
    const ut=document.getElementById('unth');
    ut.innerHTML=nv.thumbnail_url?'<img src="'+nv.thumbnail_url+'" alt="">':'<span style="font-size:32px">&#127916;</span>';
    ut.innerHTML+='<div class="unring"><svg viewBox="0 0 42 42"><circle class="rbg" cx="21" cy="21" r="17.5"/><circle class="rfill" id="rf" cx="21" cy="21" r="17.5"/></svg><div class="rnum" id="rn">5</div></div>';
    document.getElementById('unn').classList.add('on');
    unC=5;const rf=document.getElementById('rf');
    if(rf)rf.style.strokeDashoffset=110;
    unT=setInterval(()=>{unC--;const rn=document.getElementById('rn'),rf2=document.getElementById('rf');if(rn)rn.textContent=unC;if(rf2)rf2.style.strokeDashoffset=110-(110*(5-unC)/5);if(unC<=0){clearInterval(unT);playNext();}},1000);
  }
}
function playNext(){cancelNext();if(curI+1<allV.length){curI++;loadV(allV[curI]);}}
function cancelNext(){clearInterval(unT);document.getElementById('unn').classList.remove('on');}
function showSpin(){document.getElementById('spin').classList.add('on');}
function hideSpin(){document.getElementById('spin').classList.remove('on');}
function toggleLike(){liked=!liked;const b=document.getElementById('likeBtn');b.style.color=liked?'#e50914':'';b.querySelector('svg').style.fill=liked?'#e50914':'currentColor';}
function doShare(){if(navigator.share){navigator.share({title:curV&&curV.title,url:window.location.href});}else{navigator.clipboard&&navigator.clipboard.writeText(window.location.href);const b=document.getElementById('shareBtn');b.textContent='Copied!';setTimeout(()=>b.textContent='Share',2000);}}
function goBack(){window.location.href='home.html';}
function onErr(){showErr('Could not load this video. Check the URL.');}
function showErr(msg){document.getElementById('loadscr').classList.add('gone');document.getElementById('emsg').textContent=msg;document.getElementById('errscr').classList.add('on');}
function fmt(s){if(!s||isNaN(s))return'0:00';const m=Math.floor(s/60),sec=Math.floor(s%60);return m+':'+(sec<10?'0':'')+sec;}
function fmtD(ts){if(!ts)return'';const d=new Date(ts);return String(d.getDate()).padStart(2,'0')+'/'+String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();}
document.addEventListener('keydown',e=>{const t=e.target.tagName;if(t==='INPUT'||t==='TEXTAREA')return;if(e.key===' '||e.key==='k'){e.preventDefault();togglePlay();}if(e.key==='ArrowLeft'){e.preventDefault();doSkip(-10);}if(e.key==='ArrowRight'){e.preventDefault();doSkip(10);}if(e.key==='ArrowUp'){e.preventDefault();const v=Math.min(1,vid.volume+.1);vid.volume=v;document.getElementById('vr').value=v;updV();}if(e.key==='ArrowDown'){e.preventDefault();const v=Math.max(0,vid.volume-.1);vid.volume=v;document.getElementById('vr').value=v;updV();}if(e.key==='m')toggleMute();if(e.key==='f')toggleFS();if(e.key==='Escape')goBack();showUI();});
</script>
</body>
