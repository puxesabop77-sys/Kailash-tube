<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Tube – Home</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --nova-red: #ff2d55;
    --nova-orange: #ff6b2b;
    --nova-yellow: #ffd700;
    --dark-bg: #060609;
    --card-bg: rgba(14,10,24,0.9);
    --sidebar-bg: rgba(10,8,18,0.97);
    --text-main: #f0e6ff;
    --text-muted: #7a7a9a;
    --border: rgba(255,45,85,0.18);
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }

  body {
    background: var(--dark-bg);
    font-family: 'Rajdhani', sans-serif;
    color: var(--text-main);
    overflow-x: hidden;
  }

  /* ANIMATED BG */
  body::before {
    content:'';
    position: fixed; inset: 0; z-index: -1;
    background:
      radial-gradient(ellipse 80% 60% at 10% 0%,   rgba(255,45,85,0.07) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 90% 100%, rgba(255,107,43,0.06) 0%, transparent 60%),
      var(--dark-bg);
  }

  /* ── TOP NAV ── */
  .topnav {
    position: sticky; top:0; z-index: 100;
    height: 64px; display: flex; align-items: center;
    padding: 0 24px; gap: 20px;
    background: rgba(6,6,9,0.95);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    box-shadow: 0 2px 30px rgba(0,0,0,0.4);
  }
  .logo-wrap {
    display: flex; align-items: center; gap:10px;
    text-decoration:none;
  }
  .logo-icon {
    width:38px; height:38px; border-radius:10px;
    background: linear-gradient(135deg, var(--nova-red), var(--nova-orange));
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 0 20px rgba(255,45,85,0.5);
    animation: logoPulse 3s ease-in-out infinite;
    flex-shrink:0;
  }
  @keyframes logoPulse {
    0%,100% { box-shadow: 0 0 20px rgba(255,45,85,0.5); }
    50%      { box-shadow: 0 0 35px rgba(255,45,85,0.8); }
  }
  .logo-icon svg { width:20px; fill:white; }
  .logo-text {
    font-family: 'Orbitron', sans-serif;
    font-size: 18px; font-weight:900;
    background: linear-gradient(135deg, #fff 0%, var(--nova-yellow) 60%, var(--nova-red) 100%);
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    letter-spacing:2px;
  }

  .search-bar {
    flex:1; max-width:520px; margin: 0 auto;
    display:flex; align-items:center;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 50px; overflow:hidden;
    transition: border-color 0.3s, box-shadow 0.3s;
  }
  .search-bar:focus-within {
    border-color: var(--nova-red);
    box-shadow: 0 0 0 3px rgba(255,45,85,0.1);
  }
  .search-bar input {
    flex:1; padding: 10px 18px;
    background:transparent; border:none; outline:none;
    color: var(--text-main); font-family: 'Rajdhani', sans-serif; font-size:15px;
  }
  .search-bar input::placeholder { color:var(--text-muted); }
  .search-bar button {
    padding: 10px 20px; background: linear-gradient(135deg, var(--nova-red), var(--nova-orange));
    border:none; cursor:pointer; color:white; font-size:16px;
    transition: opacity 0.2s;
  }
  .search-bar button:hover { opacity:0.85; }

  .nav-right { display:flex; align-items:center; gap:12px; margin-left:auto; }
  .btn-logout {
    padding: 8px 18px; border-radius:8px;
    background: rgba(255,45,85,0.12);
    border: 1px solid rgba(255,45,85,0.3);
    color: var(--nova-red); font-family:'Rajdhani',sans-serif;
    font-size:13px; font-weight:700; letter-spacing:1px;
    cursor:pointer; transition:all 0.2s;
  }
  .btn-logout:hover { background:rgba(255,45,85,0.2); }
  .user-badge {
    width:36px; height:36px; border-radius:50%;
    background: linear-gradient(135deg, var(--nova-red), var(--nova-orange));
    display:flex; align-items:center; justify-content:center;
    font-family:'Orbitron',sans-serif; font-size:14px; font-weight:700;
    box-shadow: 0 0 12px rgba(255,45,85,0.4);
  }

  /* ── LAYOUT ── */
  .main-layout { display:flex; min-height: calc(100vh - 64px); }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 220px; flex-shrink:0;
    background: var(--sidebar-bg);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    position: sticky; top:64px; height: calc(100vh - 64px);
    overflow-y: auto;
  }
  .sidebar-section { margin-bottom:8px; }
  .sidebar-label {
    font-size:10px; font-weight:700; letter-spacing:2px;
    color:var(--text-muted); text-transform:uppercase;
    padding: 8px 20px 6px;
  }
  .sidebar-item {
    display:flex; align-items:center; gap:12px;
    padding: 11px 20px; cursor:pointer;
    color: var(--text-muted); font-size:15px; font-weight:600;
    border-left: 3px solid transparent;
    transition: all 0.2s ease; text-decoration:none;
  }
  .sidebar-item:hover, .sidebar-item.active {
    color: var(--text-main);
    background: rgba(255,45,85,0.07);
    border-left-color: var(--nova-red);
  }
  .sidebar-item span { font-size:18px; }

  /* ── CONTENT ── */
  .content { flex:1; padding: 32px 28px; overflow-y:auto; }

  .section-heading {
    font-family:'Orbitron', sans-serif;
    font-size:15px; font-weight:700; letter-spacing:2px;
    color:var(--text-muted); text-transform:uppercase;
    margin-bottom:20px; padding-bottom:10px;
    border-bottom: 1px solid var(--border);
  }
  .section-heading span { color:var(--nova-red); }

  /* ── VIDEO GRID ── */
  .video-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 24px;
    margin-bottom: 48px;
  }

  .video-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px; overflow:hidden;
    cursor:pointer; transition:all 0.35s cubic-bezier(0.16,1,0.3,1);
    animation: cardIn 0.6s both;
    transform-style: preserve-3d;
  }
  .video-card:nth-child(2) { animation-delay:0.1s; }
  .video-card:nth-child(3) { animation-delay:0.2s; }
  .video-card:nth-child(4) { animation-delay:0.3s; }
  .video-card:nth-child(5) { animation-delay:0.4s; }
  .video-card:nth-child(6) { animation-delay:0.5s; }

  @keyframes cardIn {
    from { opacity:0; transform:translateY(30px) scale(0.96); }
    to   { opacity:1; transform:translateY(0) scale(1); }
  }

  .video-card:hover {
    transform: translateY(-8px) scale(1.02);
    border-color: rgba(255,45,85,0.4);
    box-shadow: 0 20px 50px rgba(0,0,0,0.5), 0 0 40px rgba(255,45,85,0.1);
  }

  .thumb-wrap {
    position:relative; padding-bottom:56.25%; overflow:hidden;
    background: #0a0a14;
  }
  .thumb-wrap video, .thumb-wrap img {
    position:absolute; inset:0; width:100%; height:100%; object-fit:cover;
  }
  .play-overlay {
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.3); opacity:0; transition:opacity 0.3s;
  }
  .video-card:hover .play-overlay { opacity:1; }
  .play-btn-big {
    width:54px; height:54px; border-radius:50%;
    background:rgba(255,45,85,0.85);
    display:flex; align-items:center; justify-content:center;
    box-shadow: 0 0 30px rgba(255,45,85,0.6);
    transform:scale(0.8); transition:transform 0.3s;
  }
  .video-card:hover .play-btn-big { transform:scale(1); }
  .play-btn-big svg { width:22px; fill:white; margin-left:3px; }

  .duration-badge {
    position:absolute; bottom:8px; right:8px;
    background:rgba(0,0,0,0.8); color:#fff;
    font-size:11px; font-weight:700; padding:2px 6px;
    border-radius:4px; letter-spacing:0.5px;
  }

  .video-info { padding:14px 16px; }
  .video-title {
    font-size:15px; font-weight:700; color:var(--text-main);
    line-height:1.4; margin-bottom:8px;
    display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden;
  }
  .video-meta { display:flex; align-items:center; gap:8px; }
  .channel-avatar {
    width:28px; height:28px; border-radius:50%;
    background:linear-gradient(135deg, var(--nova-red), var(--nova-orange));
    display:flex; align-items:center; justify-content:center;
    font-size:11px; font-weight:800; flex-shrink:0;
  }
  .meta-text { font-size:13px; color:var(--text-muted); line-height:1.3; }
  .meta-text strong { color: rgba(255,255,255,0.6); font-weight:600; }

  /* ── EMPTY STATE ── */
  .empty-state {
    text-align:center; padding: 60px 20px;
    color:var(--text-muted);
  }
  .empty-icon { font-size:64px; margin-bottom:16px; opacity:0.5; }
  .empty-state h3 {
    font-family:'Orbitron',sans-serif; font-size:18px;
    color:var(--text-muted); margin-bottom:8px;
  }

  /* RESPONSIVE */
  @media(max-width:768px){
    .sidebar { display:none; }
    .content { padding:20px 16px; }
    .video-grid { grid-template-columns: repeat(auto-fill, minmax(220px,1fr)); gap:16px; }
  }
</style>
</head>
<body>

<!-- TOP NAV -->
<nav class="topnav">
  <a class="logo-wrap" href="index.html">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <span class="logo-text">NOVA TUBE</span>
  </a>
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="Search videos..." oninput="filterVideos()">
    <button>🔍</button>
  </div>
  <div class="nav-right">
    <div class="user-badge" id="userBadge">?</div>
    <button class="btn-logout" onclick="logout()">LOGOUT</button>
  </div>
</nav>

<!-- MAIN LAYOUT -->
<div class="main-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-section">
      <a class="sidebar-item active" href="home.html"><span>🏠</span> Home</a>
      <a class="sidebar-item" href="#"><span>🔥</span> Trending</a>
      <a class="sidebar-item" href="#"><span>📺</span> Subscriptions</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Library</div>
      <a class="sidebar-item" href="#"><span>🕐</span> History</a>
      <a class="sidebar-item" href="#"><span>❤️</span> Liked Videos</a>
      <a class="sidebar-item" href="#"><span>🔖</span> Saved</a>
    </div>
    <div class="sidebar-section">
      <div class="sidebar-label">Categories</div>
      <a class="sidebar-item" href="#"><span>🎮</span> Gaming</a>
      <a class="sidebar-item" href="#"><span>🎵</span> Music</a>
      <a class="sidebar-item" href="#"><span>🎬</span> Movies</a>
      <a class="sidebar-item" href="#"><span>📰</span> News</a>
      <a class="sidebar-item" href="#"><span>🏆</span> Sports</a>
    </div>
  </aside>

  <!-- CONTENT -->
  <main class="content">
    <div class="section-heading"><span>▶</span> NOVA TUBE — Latest Videos</div>
    <div class="video-grid" id="videoGrid">
      <!-- Videos loaded here -->
      <div class="empty-state" id="emptyState">
        <div class="empty-icon">🚀</div>
        <h3>No Videos Yet</h3>
        <p>Videos uploaded by admin will appear here.</p>
      </div>
    </div>
  </main>
</div>

<!-- VIDEO PLAYER MODAL -->
<div id="playerModal" style="display:none; position:fixed; inset:0; z-index:1000; background:rgba(0,0,0,0.92); backdrop-filter:blur(10px); display:none; align-items:center; justify-content:center;">
  <div style="width:90%; max-width:860px; background:#0d0a1a; border-radius:20px; overflow:hidden; border:1px solid rgba(255,45,85,0.3); box-shadow:0 0 80px rgba(255,45,85,0.2);">
    <div style="display:flex; justify-content:space-between; align-items:center; padding:16px 20px; border-bottom:1px solid rgba(255,45,85,0.15);">
      <span id="modalTitle" style="font-family:'Orbitron',sans-serif; font-size:16px; color:#f0e6ff;"></span>
      <button onclick="closePlayer()" style="background:rgba(255,45,85,0.15); border:1px solid rgba(255,45,85,0.3); color:#ff2d55; border-radius:8px; padding:6px 14px; cursor:pointer; font-family:'Rajdhani',sans-serif; font-weight:700;">✕ CLOSE</button>
    </div>
    <video id="modalVideo" controls style="width:100%; display:block; background:#000; max-height:500px;"></video>
    <div id="modalDesc" style="padding:16px 20px; color:#7a7a9a; font-size:14px; line-height:1.6;"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
  const { createClient } = supabase;
  const sb = createClient(
    'https://ahhuhanjvwrltwdnrqxc.supabase.co',
    'sb_publishable_vCOpkdTBVH1d4exzr82JIQ_uNJNIzIu'
  );

  let allVideos = [];

  // ── AUTH CHECK ──
  (async()=>{
    const { data:{ session } } = await sb.auth.getSession();
    if(!session){ window.location.href='index.html'; return; }
    const name = session.user.user_metadata?.full_name || session.user.email;
    document.getElementById('userBadge').textContent = name.charAt(0).toUpperCase();
    loadVideos();
  })();

  // ── LOAD VIDEOS FROM SUPABASE ──
  async function loadVideos() {
    const { data, error } = await sb.from('videos').select('*').order('created_at', { ascending:false });
    if(error){ console.error(error); return; }
    allVideos = data || [];
    renderVideos(allVideos);
  }

  function renderVideos(videos) {
    const grid = document.getElementById('videoGrid');
    const empty = document.getElementById('emptyState');
    if(!videos.length){
      empty.style.display='block';
      grid.innerHTML='';
      grid.appendChild(empty);
      return;
    }
    empty.style.display='none';
    grid.innerHTML = videos.map((v,i) => `
      <div class="video-card" onclick="openPlayer('${v.video_url}','${escHtml(v.title)}','${escHtml(v.description||'')}')">
        <div class="thumb-wrap">
          ${v.thumbnail_url
            ? `<img src="${v.thumbnail_url}" alt="${escHtml(v.title)}">`
            : `<div style="position:absolute;inset:0;background:linear-gradient(135deg,#1a0a1e,#0a1020);display:flex;align-items:center;justify-content:center;font-size:40px;">🎬</div>`}
          <div class="play-overlay">
            <div class="play-btn-big">
              <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
          <div class="duration-badge">${v.duration || '?:??'}</div>
        </div>
        <div class="video-info">
          <div class="video-title">${escHtml(v.title)}</div>
          <div class="video-meta">
            <div class="channel-avatar">${(v.channel_name||'N').charAt(0)}</div>
            <div class="meta-text">
              <strong>${escHtml(v.channel_name||'Nova Channel')}</strong><br>
              ${v.views||0} views · ${timeAgo(v.created_at)}
            </div>
          </div>
        </div>
      </div>
    `).join('');
  }

  function filterVideos() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    renderVideos(allVideos.filter(v => v.title.toLowerCase().includes(q)));
  }

  function openPlayer(url, title, desc) {
    document.getElementById('modalVideo').src = url;
    document.getElementById('modalTitle').textContent = title;
    document.getElementById('modalDesc').textContent = desc;
    document.getElementById('playerModal').style.display='flex';
  }
  function closePlayer() {
    document.getElementById('modalVideo').pause();
    document.getElementById('playerModal').style.display='none';
  }

  async function logout() {
    await sb.auth.signOut();
    window.location.href='index.html';
  }

  function escHtml(s){ return (s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function timeAgo(ts){ if(!ts) return ''; const s=(Date.now()-new Date(ts))/1000; if(s<60) return 'Just now'; if(s<3600) return Math.floor(s/60)+'m ago'; if(s<86400) return Math.floor(s/3600)+'h ago'; return Math.floor(s/86400)+'d ago'; }
</script>
</body>
</html>
