<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nova Tube</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #e50914;
    --bg: #0a0a0a;
    --card-bg: #111;
    --border: rgba(255,255,255,0.08);
    --text: #fff;
    --muted: #888;
  }

  * { margin:0; padding:0; box-sizing:border-box; }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    overflow-x: hidden;
    -webkit-tap-highlight-color: transparent;
  }

  /* ── NAVBAR ── */
  .navbar {
    position: fixed; top:0; left:0; right:0; z-index:1000;
    height: 60px;
    display: flex; align-items: center;
    padding: 0 16px;
    background: #0a0a0a;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .nav-logo { display:flex; align-items:center; gap:10px; text-decoration:none; }
  .nav-logo-icon {
    width: 36px; height: 36px; border-radius: 8px;
    background: var(--red);
    display: flex; align-items: center; justify-content: center;
  }
  .nav-logo-icon svg { width:18px; fill:#fff; margin-left:2px; }
  .nav-logo-text {
    font-size: 18px; font-weight: 900; letter-spacing: -0.3px; color:#fff;
  }
  .nav-logo-text span { color: var(--red); }

  .nav-right {
    margin-left: auto;
    display: flex; align-items: center; gap: 14px;
  }
  .nav-search-btn {
    background: none; border: none;
    color: #aaa; font-size: 20px; cursor: pointer;
    display: flex; align-items: center;
  }
  .user-av-wrap { position: relative; }
  .user-av {
    width: 38px; height: 38px; border-radius: 50%;
    background: linear-gradient(135deg, #e50914, #c850c0, #4158d0);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; font-weight: 800; cursor: pointer;
    overflow: hidden;
  }
  .user-drop {
    display: none; position: absolute; right:0; top:48px;
    background: #1a1a1a; border:1px solid var(--border);
    border-radius:12px; min-width:180px; overflow:hidden;
    box-shadow:0 16px 40px rgba(0,0,0,0.8); z-index:200;
  }
  .user-av-wrap:hover .user-drop { display: block; }
  .drop-item {
    padding:13px 16px; font-size:14px; color:#ccc;
    cursor:pointer; display:flex; align-items:center; gap:10px;
    transition:background 0.15s;
  }
  .drop-item:hover { background:rgba(255,255,255,0.06); }
  .drop-divider { height:1px; background:var(--border); }
  .drop-item.red { color:#ff6b6b; }

  /* ── SEARCH OVERLAY ── */
  .search-overlay {
    display:none; position:fixed; inset:0; z-index:2000;
    background:rgba(0,0,0,0.95); backdrop-filter:blur(8px);
    align-items:flex-start; justify-content:center;
    padding-top:90px;
  }
  .search-overlay.open { display:flex; }
  .search-box {
    width:90%; max-width:560px;
    background:#1a1a1a; border:1px solid #333;
    border-radius:12px; display:flex; align-items:center;
    overflow:hidden;
  }
  .search-box:focus-within { border-color:rgba(229,9,20,0.5); }
  .search-box input {
    flex:1; padding:16px 18px; background:none; border:none; outline:none;
    color:#fff; font-size:16px; font-family:'Inter',sans-serif;
  }
  .search-box input::placeholder { color:#444; }
  .search-close {
    padding:14px 16px; background:none; border:none;
    color:#666; font-size:20px; cursor:pointer;
  }

  /* ── HERO ── */
  .hero {
    margin-top: 60px;
    position: relative;
    height: 56vw; min-height:280px; max-height:500px;
    overflow: hidden; background:#000;
  }
  .hero-bg {
    position: absolute; inset:0;
    background: url('https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?w=1400&q=80') center/cover no-repeat;
    filter: brightness(0.38) saturate(1.2);
    transition: background-image 0.6s ease;
  }
  .hero-overlay {
    position: absolute; inset:0;
    background:
      linear-gradient(to right, rgba(10,10,10,0.92) 0%, rgba(10,10,10,0.3) 60%, transparent 100%),
      linear-gradient(to top, #0a0a0a 0%, transparent 38%);
  }
  .hero-body {
    position: relative; z-index:2;
    height: 100%; display:flex; flex-direction:column;
    justify-content: flex-end;
    padding: 0 16px 24px;
  }
  .hero-trending-badge {
    display: inline-block;
    background: var(--red); color:#fff;
    font-size:9px; font-weight:800; letter-spacing:2px;
    text-transform:uppercase; padding:4px 10px; border-radius:4px;
    margin-bottom:12px; width:fit-content;
  }
  .hero-title {
    font-size: clamp(28px, 8vw, 50px);
    font-weight: 900; line-height:1.0;
    margin-bottom: 10px;
    text-shadow: 0 2px 12px rgba(0,0,0,0.6);
  }
  .hero-title .red { color: var(--red); }
  .hero-sub {
    font-size: 13px; color: #bbb; line-height:1.5;
    max-width: 300px; margin-bottom: 18px;
  }
  .hero-btns { display:flex; gap:10px; }
  .btn-watch-trailer {
    display: inline-flex; align-items:center; gap:8px;
    padding:11px 22px; background:#fff; color:#000;
    border:none; border-radius:50px; cursor:pointer;
    font-family:'Inter',sans-serif; font-size:13px; font-weight:800;
    transition:background 0.15s;
  }
  .btn-watch-trailer:hover { background:#ddd; }
  .btn-mylist {
    display: inline-flex; align-items:center; gap:6px;
    padding:11px 20px; background:rgba(60,60,60,0.9); color:#fff;
    border:none; border-radius:50px; cursor:pointer;
    font-family:'Inter',sans-serif; font-size:13px; font-weight:600;
    transition:background 0.15s;
  }
  .btn-mylist:hover { background:rgba(80,80,80,0.9); }

  /* ── PAGE ── */
  .page { padding-bottom: 60px; }

  /* ── SECTION HEADER ── */
  .sec-head {
    display:flex; justify-content:space-between; align-items:flex-end;
    padding: 22px 16px 0;
    margin-bottom: 16px;
  }
  .sec-title {
    font-size: 22px; font-weight: 900; color:#fff;
    letter-spacing: -0.3px;
  }
  .sec-underline {
    width: 38px; height: 3px; background: var(--red);
    border-radius:2px; margin-top:5px;
  }
  .sec-see-all {
    color: var(--red); font-size:15px; font-weight:700;
    cursor:pointer; background:none; border:none;
    font-family:'Inter',sans-serif; line-height:1.3;
    text-align:right;
  }

  /* ── VIDEO CARDS — EXACTLY LIKE SCREENSHOT ── */
  .video-list {
    padding: 0 12px;
    display: flex; flex-direction: column; gap: 20px;
  }

  .vcard {
    background: var(--card-bg);
    border-radius: 14px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.07);
    cursor: pointer;
    transition: transform 0.2s ease;
  }
  .vcard:hover { transform: scale(1.01); }
  .vcard:active { transform: scale(0.99); }

  /* VIDEO PLAYER AREA — exactly like screenshot */
  .vcard-player {
    position: relative;
    width: 100%;
    background: #000;
    border-radius: 0;
  }
  .vcard-player video {
    width: 100%;
    display: block;
    max-height: 230px;
    object-fit: cover;
    background: #000;
  }
  .vcard-player-thumb {
    width: 100%; aspect-ratio:16/9;
    object-fit: cover; display:block;
    background: #000;
  }
  .vcard-thumb-ph {
    width:100%; aspect-ratio:16/9;
    background: linear-gradient(135deg,#1a0505,#0d0d1a);
    display:flex; align-items:center; justify-content:center;
    font-size:50px;
  }

  /* 4K HDR badge — top right */
  .hdr-tag {
    position: absolute; top:10px; right:10px;
    background: rgba(14,14,14,0.88);
    border: 1.5px solid var(--red);
    color: var(--red);
    font-size: 10px; font-weight: 800; letter-spacing:1px;
    padding: 3px 8px; border-radius:5px;
  }

  /* Overlay play button */
  .thumb-overlay {
    position:absolute; inset:0;
    display:flex; align-items:center; justify-content:center;
    background:rgba(0,0,0,0.18);
  }
  .play-circle {
    width: 62px; height:62px; border-radius:50%;
    background: rgba(230,230,230,0.92);
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 20px rgba(0,0,0,0.5);
  }
  .play-circle svg { width:24px; fill:#000; margin-left:3px; }

  /* CARD INFO */
  .vcard-info { padding:12px 14px 14px; }
  .vcard-title {
    font-size:15px; font-weight:800; color:#fff;
    margin-bottom:6px; line-height:1.3;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
  }
  .vcard-bottom {
    display:flex; align-items:center; gap:8px;
  }
  .vcard-date { font-size:13px; color:var(--muted); }
  .vcard-dot { color:#444; font-size:13px; }
  .vcard-watch-now {
    font-size:13px; font-weight:700; color:#fff;
    text-decoration:underline; cursor:pointer;
    transition:color 0.15s;
  }
  .vcard-watch-now:hover { color:#ddd; }

  /* ── HORIZONTAL SCROLL ROWS (secondary) ── */
  .hrow { padding:0 12px; }
  .hscroll {
    display:flex; gap:10px;
    overflow-x:auto; padding-bottom:4px;
    scrollbar-width:none;
  }
  .hscroll::-webkit-scrollbar { display:none; }
  .hcard {
    flex-shrink:0; width:160px; border-radius:10px;
    overflow:hidden; background:#1a1a1a;
    border:1px solid var(--border); cursor:pointer;
    transition:transform 0.2s;
  }
  .hcard:hover { transform:scale(1.04); }
  .hcard-thumb {
    width:100%; aspect-ratio:16/9; object-fit:cover; display:block;
    background:linear-gradient(135deg,#1a0505,#1a1a2e);
  }
  .hcard-ph {
    width:100%; aspect-ratio:16/9;
    background:linear-gradient(135deg,#1a0505,#1a1a2e);
    display:flex; align-items:center; justify-content:center; font-size:26px;
  }
  .hcard-body { padding:8px 10px 10px; }
  .hcard-title {
    font-size:12px; font-weight:700; color:#e5e5e5;
    white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-bottom:2px;
  }
  .hcard-meta { font-size:11px; color:#555; }

  /* EMPTY */
  .empty-state { text-align:center; padding:48px 20px; color:#444; }
  .empty-state .ei { font-size:52px; opacity:.35; margin-bottom:14px; }
  .empty-state h3 { font-size:18px; color:#555; margin-bottom:6px; }

  /* ── PLAYER MODAL ── */
  .player-modal {
    display:none; position:fixed; inset:0; z-index:3000;
    background:rgba(0,0,0,0.97);
    align-items:center; justify-content:center;
    padding:16px;
  }
  .player-modal.open { display:flex; }
  .player-box {
    width:100%; max-width:860px;
    background:#161616; border-radius:14px; overflow:hidden;
    animation:popIn .25s cubic-bezier(.16,1,.3,1);
    max-height:90vh; overflow-y:auto;
  }
  @keyframes popIn { from{opacity:0;transform:scale(.95)} to{opacity:1;transform:scale(1)} }
  .player-head {
    display:flex; align-items:center; gap:12px;
    padding:14px 16px; background:#111;
    border-bottom:1px solid var(--border);
    position:sticky; top:0;
  }
  .player-head-title { flex:1; font-size:15px; font-weight:700; }
  .player-close-btn {
    width:34px; height:34px; border-radius:50%;
    background:rgba(255,255,255,0.08); border:none;
    color:#fff; font-size:18px; cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    transition:background .2s;
  }
  .player-close-btn:hover { background:rgba(229,9,20,.4); }
  .player-video { width:100%; display:block; background:#000; }
  .player-info { padding:14px 16px 18px; }
  .player-info-title { font-size:16px; font-weight:800; margin-bottom:6px; }
  .player-info-meta { font-size:13px; color:var(--muted); display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
  .player-info-desc { font-size:13px; color:#888; line-height:1.6; }
</style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar">
  <a class="nav-logo" href="#">
    <div class="nav-logo-icon">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </div>
    <div class="nav-logo-text">NOVA <span>TUBE</span></div>
  </a>
  <div class="nav-right">
    <button class="nav-search-btn" onclick="openSearch()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </button>
    <div class="user-av-wrap">
      <div class="user-av" id="userAv">?</div>
      <div class="user-drop">
        <div class="drop-item">👤 &nbsp;<span id="dropName">Profile</span></div>
        <div class="drop-divider"></div>
        <div class="drop-item red" onclick="logout()">🚪 &nbsp;Sign Out</div>
      </div>
    </div>
  </div>
</nav>

<!-- SEARCH OVERLAY -->
<div class="search-overlay" id="searchOverlay" onclick="bgClose(event)">
  <div class="search-box">
    <input id="searchInput" type="text" placeholder="Search Nova Tube..." oninput="filterVids()">
    <button class="search-close" onclick="closeSearch()">✕</button>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <div class="hero-bg" id="heroBg"></div>
  <div class="hero-overlay"></div>
  <div class="hero-body">
    <span class="hero-trending-badge">TRENDING NOW</span>
    <div class="hero-title" id="heroTitle">LIMITLESS<br><span class="red">CINEMA.</span></div>
    <div class="hero-sub" id="heroSub">Experience high-definition streaming exclusively on Nova Tube. Your vision, our platform.</div>
    <div class="hero-btns">
      <button class="btn-watch-trailer" onclick="playHero()">
        <svg width="12" viewBox="0 0 24 24" fill="#000"><path d="M8 5v14l11-7z"/></svg>
        Watch Trailer
      </button>
      <button class="btn-mylist">+ My List</button>
    </div>
  </div>
</div>

<!-- PAGE -->
<div class="page">

  <!-- RECOMMENDED FOR YOU -->
  <div id="recSection">
    <div class="sec-head">
      <div>
        <div class="sec-title" id="secTitle">You</div>
        <div class="sec-underline"></div>
      </div>
      <button class="sec-see-all">See<br>All</button>
    </div>
    <div class="video-list" id="videoList">
      <div class="empty-state">
        <div class="ei">🎬</div>
        <h3>No Videos Yet</h3>
        <p>Upload from admin panel.</p>
      </div>
    </div>
  </div>

  <!-- CAT ROWS -->
  <div id="catRows"></div>

</div>

<!-- PLAYER MODAL -->
<div class="player-modal" id="playerModal">
  <div class="player-box">
    <div class="player-head">
      <div class="player-head-title" id="playerTitle">—</div>
      <button class="player-close-btn" onclick="closePlayer()">✕</button>
    </div>
    <video class="player-video" id="playerVid" controls></video>
    <div class="player-info">
      <div class="player-info-title" id="playerInfoTitle"></div>
      <div class="player-info-meta">
        <span id="playerChannel">—</span>
        <span id="playerViews">0 views</span>
        <span id="playerDate">—</span>
      </div>
      <div class="player-info-desc" id="playerDesc"></div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = supabase;
const sb = createClient(
  'https://ahhuhanjvwrltwdnrqxc.supabase.co',
  'sb_publishable_vCOpkdTBVH1d4exzr82JIQ_uNJNIzIu'
);

let allVids = [];
let heroV   = null;

/* ─ AUTH ─ */
(async () => {
  const { data:{ session } } = await sb.auth.getSession();
  if (!session) { window.location.href = 'index.html'; return; }
  const u    = session.user;
  const name = u.user_metadata?.full_name || u.email.split('@')[0];
  document.getElementById('userAv').textContent   = name.charAt(0).toUpperCase();
  document.getElementById('dropName').textContent = name;
  await loadVids();
})();

/* ─ LOAD ─ */
async function loadVids() {
  const { data } = await sb.from('videos').select('*').order('created_at',{ ascending:false });
  if (!data) return;
  allVids = data;
  renderAll(allVids);
  if (allVids.length) setHero(allVids[0]);
}

/* ─ HERO ─ */
function setHero(v) {
  heroV = v;
  if (v.thumbnail_url) {
    const bg = document.getElementById('heroBg');
    bg.style.backgroundImage   = `url('${v.thumbnail_url}')`;
    bg.style.backgroundSize    = 'cover';
    bg.style.backgroundPosition = 'center';
  }
}
function playHero() { if (heroV) openPlayer(heroV); }

/* ─ RENDER ─ */
function renderAll(vids) {
  const list = document.getElementById('videoList');

  if (!vids.length) {
    list.innerHTML = `<div class="empty-state"><div class="ei">🎬</div><h3>No Videos Yet</h3><p>Upload from admin panel.</p></div>`;
    document.getElementById('catRows').innerHTML = '';
    return;
  }

  list.innerHTML = vids.map(v => bigCard(v)).join('');

  /* category horizontal rows */
  const cats = [...new Set(vids.map(v => v.category).filter(Boolean))];
  document.getElementById('catRows').innerHTML = cats.map(cat => {
    const cv = vids.filter(v => v.category === cat);
    if (cv.length < 2) return '';
    return `
    <div style="margin-top:10px;">
      <div class="sec-head">
        <div>
          <div class="sec-title">${catIcon(cat)} ${cat}</div>
          <div class="sec-underline"></div>
        </div>
        <button class="sec-see-all">See All</button>
      </div>
      <div class="hrow">
        <div class="hscroll">${cv.map(v => smallCard(v)).join('')}</div>
      </div>
    </div>`;
  }).join('');
}

/* ─ BIG CARD (exactly like screenshot) ─ */
function bigCard(v) {
  const dateStr = fmtDate(v.created_at);

  /* media element */
  let mediaEl;
  if (v.thumbnail_url) {
    mediaEl = `
      <div class="thumb-overlay">
        <div class="play-circle">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <img class="vcard-player-thumb" src="${esc(v.thumbnail_url)}" alt="${esc(v.title)}" loading="lazy">`;
  } else {
    mediaEl = `
      <div class="thumb-overlay">
        <div class="play-circle">
          <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        </div>
      </div>
      <div class="vcard-thumb-ph">${catIcon(v.category)}</div>`;
  }

  return `
  <div class="vcard" onclick='openPlayer(${safeJson(v)})'>
    <div class="vcard-player">
      ${mediaEl}
      <div class="hdr-tag">4K HDR</div>
    </div>
    <div class="vcard-info">
      <div class="vcard-title">${esc(v.title)}</div>
      <div class="vcard-bottom">
        <span class="vcard-date">${dateStr}</span>
        <span class="vcard-dot">•</span>
        <span class="vcard-watch-now">Watch Now</span>
      </div>
    </div>
  </div>`;
}

/* ─ SMALL CARD ─ */
function smallCard(v) {
  const th = v.thumbnail_url
    ? `<img class="hcard-thumb" src="${esc(v.thumbnail_url)}" loading="lazy">`
    : `<div class="hcard-ph">${catIcon(v.category)}</div>`;
  return `
  <div class="hcard" onclick='openPlayer(${safeJson(v)})'>
    ${th}
    <div class="hcard-body">
      <div class="hcard-title">${esc(v.title)}</div>
      <div class="hcard-meta">${fmtDate(v.created_at)}</div>
    </div>
  </div>`;
}

/* ─ SEARCH ─ */
function openSearch() {
  document.getElementById('searchOverlay').classList.add('open');
  setTimeout(() => document.getElementById('searchInput').focus(), 80);
}
function closeSearch() {
  document.getElementById('searchOverlay').classList.remove('open');
  document.getElementById('searchInput').value = '';
  renderAll(allVids);
}
function bgClose(e) { if (e.target === document.getElementById('searchOverlay')) closeSearch(); }
function filterVids() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  renderAll(!q ? allVids : allVids.filter(v =>
    v.title.toLowerCase().includes(q) ||
    (v.description||'').toLowerCase().includes(q)
  ));
}

/* ─ PLAYER ─ */
function openPlayer(v) {
  if (typeof v === 'string') v = JSON.parse(v);
  const vid = document.getElementById('playerVid');
  vid.src = v.video_url || '';
  vid.load();
  document.getElementById('playerTitle').textContent     = v.title || '';
  document.getElementById('playerInfoTitle').textContent = v.title || '';
  document.getElementById('playerChannel').textContent   = v.channel_name || 'Nova Channel';
  document.getElementById('playerViews').textContent     = (v.views||0) + ' views';
  document.getElementById('playerDate').textContent      = fmtDate(v.created_at);
  document.getElementById('playerDesc').textContent      = v.description || 'No description available.';
  document.getElementById('playerModal').classList.add('open');
  sb.from('videos').update({ views:(v.views||0)+1 }).eq('id', v.id);
}
function closePlayer() {
  document.getElementById('playerVid').pause();
  document.getElementById('playerVid').src = '';
  document.getElementById('playerModal').classList.remove('open');
}
document.getElementById('playerModal').addEventListener('click', function(e){
  if (e.target === this) closePlayer();
});

async function logout() { await sb.auth.signOut(); window.location.href = 'index.html'; }

/* ─ UTILS ─ */
function catIcon(c) {
  return ({Gaming:'🎮',Music:'🎵',Movies:'🎬',Education:'📚',Sports:'🏆',News:'📰'})[c] || '🎥';
}
function fmtDate(ts) {
  if (!ts) return '';
  const d = new Date(ts);
  const dd  = String(d.getDate()).padStart(2,'0');
  const mm  = String(d.getMonth()+1).padStart(2,'0');
  const yy  = d.getFullYear();
  return `${dd}/${mm}/${yy}`;
}
function esc(s) {
  return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function safeJson(v) {
  return JSON.stringify(v).replace(/\\/g,'\\\\').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
